<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1A1614;
    --paper: #F7F3EE;
    --warm: #E8DFD4;
    --rule: #D4C9BC;
    --accent: #8B3A2A;
    --accent-light: #F2E8E5;
    --teal: #3A8B7A;
    --teal-light: #E5F2EF;
    --gold: #B07D2A;
    --gold-light: #F5EDD8;
    --done-bg: #EAF3DE;
    --done-border: #639922;
    --done-text: #27500A;
    --star: #C8A020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
  }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
    color: #8B7D72;
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
  .empty-title { font-family: 'Libre Baskerville', serif; font-size: 16px; color: #6B5E52; margin-bottom: 6px; }
  .empty-sub { font-size: 12px; }

  .order-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .order-title { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; }
  .order-sub { font-size: 12px; color: #6B5E52; }
  .order-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500;
    letter-spacing: .03em; text-transform: uppercase;
    background: var(--teal-light); color: var(--teal); border: 1px solid #9ACFC7;
  }

  .search-row { margin: 14px 0 18px; }
  .search-input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--rule); border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 13px; background: white; color: var(--ink); outline: none;
  }
  .search-input:focus { border-color: var(--accent); }

  .slabel {
    font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: #8B7D72; margin: 20px 0 10px;
  }
  .slabel:first-of-type { margin-top: 0; }

  .line-block {
    border: 1px solid var(--rule); border-radius: 8px; padding: 12px; margin-bottom: 14px; background: white;
  }
  .line-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .line-sku { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .line-qty { font-size: 11px; color: #8B7D72; }
  .line-guess { font-size: 11px; color: #8B7D72; font-style: italic; }

  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .no-match { color: #8B7D72; font-size: 12px; font-style: italic; padding: 6px 0; }

  .pcard {
    border: 1.5px solid var(--warm); border-radius: 6px; overflow: hidden; background: white;
  }
  .pcard.fav { border-color: var(--star); }
  .pcard img {
    width: 100%; height: 110px; object-fit: cover; display: block; background: var(--warm);
  }
  .pcard-body { padding: 8px; }
  .pcard-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .pcard-meta { font-size: 10px; color: #8B7D72; margin-bottom: 6px; }
  .pcard-status {
    display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .04em; font-weight: 500; margin-bottom: 6px;
  }
  .status-approved { background: var(--done-bg); color: var(--done-text); }
  .status-pending { background: var(--gold-light); color: var(--gold); }
  .status-rejected { background: var(--accent-light); color: var(--accent); }
  .status-other { background: var(--warm); color: #6B5E52; }

  .pcard-actions { display: flex; align-items: center; gap: 6px; }
  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 16px; color: var(--rule); line-height: 1; padding: 2px;
  }
  .star-btn.on { color: var(--star); }
  .share-btn {
    flex: 1; font-size: 11px; padding: 5px 8px; border-radius: 4px; border: 1px solid var(--accent);
    background: var(--accent); color: white; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .share-btn:disabled { opacity: .6; cursor: default; }
  .share-btn.shared { background: var(--done-bg); border-color: var(--done-border); color: var(--done-text); }
  .share-note { font-size: 9px; color: #8B7D72; margin-top: 4px; }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="empty" id="emptyState">
  <div class="empty-icon">🖼️</div>
  <div class="empty-title">No order selected</div>
  <div class="empty-sub">Click a row in the Work Orders table to see its photo matches</div>
</div>

<div id="mainView" style="display:none">
  <div class="order-header">
    <div class="order-title" id="orderTitle"></div>
    <div class="order-sub" id="orderSub"></div>
    <div class="order-tag" id="orderChannel"></div>
  </div>

  <div class="search-row">
    <input class="search-input" id="searchBox" type="text" placeholder="Search all photos by colorway..." oninput="renderSearch(this.value)">
  </div>

  <div id="searchResults"></div>
  <div id="linesContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
// Replace with the production webhook URL once the n8n workflow
// "SS - Share Photo to Vendor" is built and activated.
const WEBHOOK_URL = 'https://squirrelystash.app.n8n.cloud/webhook/share-photo';

const VENDOR_CODES = ['RDG','MMI','DNR','HBO','FOR','OBO','BMW','CDR','VVM','ACD','SOB',
  'JIR','TRM','BAF','MYO','DWK','ALA','VAR','BBR','KPA','RIG','NWW'];

let currentOrder = null;
let orderLines = [];
let allPhotos = [];
let existingShares = []; // [{photoId, workOrderId, destPath, sharedAt}]
let vendorCode = '';

function getRefId(ref) {
  if (typeof ref === 'number') return ref;
  if (Array.isArray(ref)) return ref[1];
  if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId;
  return null;
}

function normalize(s) {
  return (s || '').toString().toLowerCase().replace(/[^a-z0-9]/g, '');
}

function parseColorwayFromSKU(sku) {
  if (!sku) return '';
  const parts = sku.split('_');
  if (parts.length < 2) return sku;
  parts.shift(); // drop fiber prefix (FFN, EN, FFC, BW)
  const last = parts[parts.length - 1];
  if (parts.length > 1 && VENDOR_CODES.includes((last || '').toUpperCase())) {
    parts.pop(); // drop trailing vendor reservation tag
  }
  return parts.join(' ');
}

function columnAsArray(tableData, col) {
  return Array.isArray(tableData[col]) ? tableData[col] : [];
}

function rowsFromTableData(tableData, colNames) {
  const ids = tableData.id || [];
  return ids.map((id, i) => {
    const row = { id };
    colNames.forEach(c => { row[c] = columnAsArray(tableData, c)[i]; });
    return row;
  });
}

function findColumn(tableData, candidates) {
  const keys = Object.keys(tableData);
  for (const cand of candidates) {
    const hit = keys.find(k => k.toLowerCase() === cand.toLowerCase());
    if (hit) return hit;
  }
  return null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function statusClass(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('approve')) return 'status-approved';
  if (s.includes('pend')) return 'status-pending';
  if (s.includes('reject')) return 'status-rejected';
  return 'status-other';
}

async function loadData(record) {
  currentOrder = record;
  const orderId = record.id;

  document.getElementById('orderTitle').textContent = record.Order_Number || 'Order';
  document.getElementById('orderSub').textContent = record.Customer_Name || '';
  document.getElementById('orderChannel').textContent = record.Channel || record.Order_Type || '';

  try {
    const [linesData, photosData, customersData, sharesData] = await Promise.all([
      grist.docApi.fetchTable('Work_Order_Lines'),
      grist.docApi.fetchTable('Product_Photos'),
      grist.docApi.fetchTable('Customers'),
      grist.docApi.fetchTable('Photo_Shares').catch(() => null),
    ]);

    // Work order lines for this order
    const lineRows = rowsFromTableData(linesData, ['Work_Order', 'SKU', 'Qty_Needed', 'Qty_Dyed', 'Production_Priority']);
    orderLines = lineRows.filter(l => getRefId(l.Work_Order) === orderId);

    // All product photos
    allPhotos = rowsFromTableData(photosData, ['Colorway_Name', 'Recipe', 'Fiber_Type', 'Lot_Date',
      'Nextcloud_URL', 'Status', 'Share_With', 'Is_Favorite', 'Notes', 'Source_Filename']);

    // Vendor code lookup — tries common column names, falls back gracefully
    const nameCol = findColumn(customersData, ['Name', 'Customer_Name', 'Vendor_Name']);
    const codeCol = findColumn(customersData, ['Code', 'Vendor_Code', 'Customer_Code', 'Abbreviation']);
    vendorCode = '';
    if (nameCol && codeCol) {
      const names = columnAsArray(customersData, nameCol);
      const codes = columnAsArray(customersData, codeCol);
      const idx = names.findIndex(n => normalize(n) === normalize(record.Customer_Name));
      if (idx >= 0) vendorCode = codes[idx];
    }
    if (!vendorCode) {
      // fallback: guess from the customer name itself if it's already a short code
      vendorCode = (record.Customer_Name || '').toString().slice(0, 3).toUpperCase();
    }

    // Existing shares, if the Photo_Shares table exists yet
    existingShares = [];
    if (sharesData) {
      const shareRows = rowsFromTableData(sharesData, ['Photo', 'Work_Order', 'Dest_Path', 'Shared_At']);
      existingShares = shareRows.map(s => ({
        shareId: s.id,
        photoId: getRefId(s.Photo),
        workOrderId: getRefId(s.Work_Order),
        destPath: s.Dest_Path,
        sharedAt: s.Shared_At,
      }));
    }

  } catch (e) {
    console.error('Failed to load data:', e);
    orderLines = [];
    allPhotos = [];
    existingShares = [];
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('searchBox').value = '';
  document.getElementById('searchResults').innerHTML = '';

  renderLines();
}

function matchPhotos(colorwayGuess) {
  const g = normalize(colorwayGuess);
  if (!g) return [];
  return allPhotos
    .filter(p => {
      const n = normalize(p.Colorway_Name);
      return n && (n.includes(g) || g.includes(n));
    })
    .sort((a, b) => {
      if (!!b.Is_Favorite !== !!a.Is_Favorite) return (b.Is_Favorite ? 1 : 0) - (a.Is_Favorite ? 1 : 0);
      return (Number(b.Lot_Date) || 0) - (Number(a.Lot_Date) || 0);
    });
}

function photoCardHTML(p) {
  const shareRecord = existingShares.find(s => s.photoId === p.id && s.workOrderId === currentOrder.id);
  const fav = !!p.Is_Favorite;
  const safeDestPath = shareRecord ? shareRecord.destPath.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
  const sharedDateLabel = shareRecord && shareRecord.sharedAt
    ? new Date(shareRecord.sharedAt * 1000).toLocaleDateString()
    : '';
  return `
    <div class="pcard ${fav ? 'fav' : ''}" id="pcard-${p.id}">
      <img src="${p.Nextcloud_URL || ''}" alt="${p.Colorway_Name || ''}" onerror="this.style.opacity=0.2">
      <div class="pcard-body">
        <div class="pcard-name">${p.Colorway_Name || 'Untitled'}</div>
        <div class="pcard-meta">${p.Fiber_Type || ''}${p.Lot_Date ? ' · ' + p.Lot_Date : ''}</div>
        <span class="pcard-status ${statusClass(p.Status)}">${p.Status || 'unknown'}</span>
        <div class="pcard-actions">
          <button class="star-btn ${fav ? 'on' : ''}" onclick="toggleFavorite(${p.id}, ${fav})" title="Mark as favorite">★</button>
          ${shareRecord
            ? `<button class="share-btn shared" onclick="unsharePhoto(${p.id}, ${shareRecord.shareId}, '${safeDestPath}', this)" title="Click to remove from vendor folder">Shared ✓ — undo</button>`
            : `<button class="share-btn" onclick="sharePhoto(${p.id}, this)">Share to order</button>`}
        </div>
        ${shareRecord ? `<div class="share-note">Sent${sharedDateLabel ? ' ' + sharedDateLabel : ''} — click to remove</div>` : ''}
      </div>
    </div>`;
}

function renderLines() {
  const container = document.getElementById('linesContainer');

  if (!orderLines.length) {
    container.innerHTML = `<div class="no-match">No line items found for this order.</div>`;
    return;
  }

  container.innerHTML = orderLines.map(line => {
    const guess = parseColorwayFromSKU(line.SKU);
    const matches = matchPhotos(guess);
    return `
      <div class="line-block">
        <div class="line-head">
          <span class="line-sku">${line.SKU || '—'}</span>
          <span class="line-qty">qty ${line.Qty_Needed ?? '—'}</span>
          <span class="line-guess">matching "${guess}"</span>
        </div>
        <div class="photo-grid">
          ${matches.length ? matches.map(photoCardHTML).join('') : `<div class="no-match">No photos matched automatically — search below to find one manually.</div>`}
        </div>
      </div>`;
  }).join('');
}

function renderSearch(query) {
  const results = document.getElementById('searchResults');
  const q = normalize(query);
  if (!q) { results.innerHTML = ''; return; }

  const matches = allPhotos
    .filter(p => normalize(p.Colorway_Name).includes(q))
    .sort((a, b) => (Number(b.Lot_Date) || 0) - (Number(a.Lot_Date) || 0));

  results.innerHTML = `
    <div class="slabel">Search results</div>
    <div class="photo-grid">
      ${matches.length ? matches.map(photoCardHTML).join('') : '<div class="no-match">No photos found.</div>'}
    </div>`;
}

async function toggleFavorite(photoId, currentlyFav) {
  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Product_Photos', photoId, { Is_Favorite: !currentlyFav }]
    ]);
    const p = allPhotos.find(p => p.id === photoId);
    if (p) p.Is_Favorite = !currentlyFav;
    renderLines();
    renderSearch(document.getElementById('searchBox').value);
  } catch (e) {
    console.error('Failed to update favorite:', e);
    showToast('Could not update favorite — check widget access level');
  }
}

async function sharePhoto(photoId, btnEl) {
  const p = allPhotos.find(p => p.id === photoId);
  if (!p || !currentOrder) return;

  if (!p.Source_Filename) {
    showToast('Missing Source_Filename for this photo — add it in Product Photos first');
    return;
  }

  btnEl.disabled = true;
  const originalText = btnEl.textContent;
  btnEl.textContent = 'Sharing...';

  const payload = {
    photo_id: photoId,
    work_order_id: currentOrder.id,
    source_filename: p.Source_Filename,
    source_path: p.Nextcloud_URL,
    vendor_code: vendorCode,
    order_number: currentOrder.Order_Number,
    colorway_name: p.Colorway_Name,
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Webhook returned ' + res.status);

    showToast(`Sent to ${vendorCode} — order ${currentOrder.Order_Number}`);
    const searchValue = document.getElementById('searchBox').value;
    await loadData(currentOrder);
    document.getElementById('searchBox').value = searchValue;
    renderSearch(searchValue);
  } catch (e) {
    console.error('Share failed:', e);
    btnEl.textContent = originalText;
    btnEl.disabled = false;
    showToast('Share failed — is the n8n webhook live?');
  }
}

const UNSHARE_WEBHOOK_URL = 'https://squirrelystash.app.n8n.cloud/webhook/unshare-photo';

async function unsharePhoto(photoId, shareId, destPath, btnEl) {
  if (!confirm('Remove this photo from the vendor folder for this order?')) return;

  btnEl.disabled = true;
  const originalText = btnEl.textContent;
  btnEl.textContent = 'Removing...';

  try {
    const res = await fetch(UNSHARE_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ share_id: shareId, dest_path: destPath }),
    });
    if (!res.ok) throw new Error('Webhook returned ' + res.status);

    existingShares = existingShares.filter(s => s.shareId !== shareId);
    renderLines();
    renderSearch(document.getElementById('searchBox').value);
    showToast('Removed from vendor folder');
  } catch (e) {
    console.error('Unshare failed:', e);
    btnEl.disabled = false;
    btnEl.textContent = originalText;
    showToast('Remove failed — is the n8n webhook live?');
  }
}

// ── GRIST INTEGRATION ──
grist.ready({
  requiredAccess: 'full'
});

grist.onRecord(async (record) => {
  if (!record) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('mainView').style.display = 'none';
    return;
  }
  await loadData(record);
});
</script>
</body>
</html>
