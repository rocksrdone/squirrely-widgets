<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Work List</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1A1614;
    --paper: #F7F3EE;
    --warm: #E8DFD4;
    --rule: #D4C9BC;
    --accent: #8B3A2A;
    --accent-light: #F2E8E5;
    --teal: #3A8B7A;
    --teal-light: #E5F2EF;
    --gold: #B07D2A;
    --gold-light: #F5EDD8;
    --done-bg: #EAF3DE;
    --done-border: #639922;
    --done-text: #27500A;
    --urgent: #A01830;
    --urgent-light: #F5E0E4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
  }

  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .header-title { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; }
  .header-sub { font-size: 11px; color: #8B7D72; }
  .refresh-btn {
    font-size: 11px; padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--rule); background: white; color: var(--ink); cursor: pointer;
  }

  .controls-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 160px; padding: 7px 10px; border: 1px solid var(--rule); border-radius: 6px;
    font-size: 13px; outline: none; background: white; color: var(--ink);
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-select {
    padding: 7px 10px; border: 1px solid var(--rule); border-radius: 6px;
    font-size: 12px; background: white; color: var(--ink); outline: none; color-scheme: light;
  }
  .filter-select option { background: white; color: var(--ink); }

  .empty-state { text-align: center; color: var(--done-text); padding: 60px 20px; font-size: 14px; }

  .work-table { width: 100%; border-collapse: collapse; }
  .work-table thead th {
    text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: #8B7D72; padding: 6px 8px; border-bottom: 2px solid var(--rule);
    position: sticky; top: 0; background: var(--paper); z-index: 2;
  }
  .work-table td { padding: 7px 8px; border-bottom: 1px solid var(--warm); vertical-align: middle; font-size: 12px; }
  .batch-row { cursor: pointer; background: white; }
  .batch-row:hover { background: var(--warm); }
  .batch-row.priority-urgent td:first-child { border-left: 3px solid var(--urgent); }
  .batch-row.priority-high td:first-child { border-left: 3px solid var(--gold); }
  .batch-row:not(.priority-urgent):not(.priority-high) td:first-child { border-left: 3px solid transparent; }

  .colorway-name { font-family: 'Libre Baskerville', serif; font-size: 13px; font-weight: 700; }
  .colorway-sku { font-family: 'DM Mono', monospace; font-size: 10px; color: #8B7D72; }

  .priority-badge {
    display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    padding: 1px 6px; border-radius: 3px; white-space: nowrap;
  }
  .priority-badge.urgent { background: var(--urgent-light); color: var(--urgent); }
  .priority-badge.high { background: var(--gold-light); color: var(--gold); }
  .priority-badge.normal { background: var(--warm); color: #6B5E52; }
  .priority-badge.low { background: var(--warm); color: #8B7D72; }

  .due-cell { font-size: 11px; white-space: nowrap; color: #6B5E52; }

  .stage-cell { white-space: nowrap; }
  .mini-track { display: inline-block; width: 42px; height: 5px; background: var(--warm); border-radius: 3px; overflow: hidden; vertical-align: middle; margin-right: 6px; }
  .mini-fill { height: 100%; background: var(--done-border); }
  .stage-input-table {
    width: 32px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; text-align: center;
    border: 1px solid var(--rule); border-radius: 3px; padding: 2px; background: white; color: var(--ink); outline: none;
  }
  .stage-input-table:focus { border-color: var(--accent); }
  .cap-text { font-family: 'DM Mono', monospace; font-size: 11px; color: #8B7D72; margin-left: 3px; }

  .orders-cell { text-align: right; font-size: 11px; color: var(--teal); font-weight: 600; white-space: nowrap; }

  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-row td { padding: 0; border-bottom: 1px solid var(--rule); }
  .detail-wrap { padding: 8px 14px; background: var(--warm); }
  .pack-summary { font-size: 11px; color: #6B5E52; margin-bottom: 6px; font-weight: 600; }

  .order-row-block { padding: 5px 0; border-bottom: 1px solid var(--rule); }
  .order-row-block:last-child { border-bottom: none; }
  .order-row {
    display: flex; justify-content: space-between; font-size: 11px; color: #6B5E52;
  }
  .line-pack-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .line-pack-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: #8B7D72; flex-shrink: 0; width: 28px; }
  .line-pack-track { flex: 1; height: 4px; background: var(--rule); border-radius: 2px; overflow: hidden; max-width: 120px; }
  .line-pack-fill { height: 100%; background: var(--done-border); }
  .line-pack-input {
    width: 30px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    border: 1px solid var(--rule); border-radius: 3px; padding: 1px 2px; text-align: center;
    background: white; color: var(--ink); outline: none; flex-shrink: 0;
  }
  .line-pack-input:focus { border-color: var(--accent); }
  .line-pack-cap { font-family: 'DM Mono', monospace; font-size: 10px; color: #8B7D72; flex-shrink: 0; white-space: nowrap; }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px;
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header-row">
  <div>
    <div class="header-title">Daily Work List</div>
    <div class="header-sub" id="headerSub">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="loadEverything()">↻ Refresh</button>
</div>

<div class="controls-row">
  <input class="search-input" id="searchBox" placeholder="Search colorway, SKU, or customer..." oninput="renderList()">
  <select class="filter-select" id="priorityFilter" onchange="renderList()">
    <option value="">All priorities</option>
    <option value="Urgent">Urgent only</option>
    <option value="High">High only</option>
    <option value="Normal">Normal only</option>
    <option value="Low">Low only</option>
  </select>
</div>

<div id="content"></div>

<div class="toast" id="toast"></div>

<script>
const DYE_COLORS = {
  red:'#C8294A',rhodamine:'#D83060',pink:'#E84080',fuschia:'#D83060',fuchsia:'#D83060',
  blue:'#2060C8',aqua:'#20A0C8',teal:'#20A890',turquoise:'#20B2A0',
  green:'#40A840',yellow:'#E8D020',orange:'#E87020',purple:'#8040C8',
  black:'#2A2A2A',brown:'#8B5A2B',gold:'#C8A020',coral:'#E05040',
  mint:'#40C890',lavender:'#A080C8',navy:'#203080',forest:'#2A6040',
  grey:'#888780',gray:'#888780',white:'#F0EDE8',silver:'#A0A0A8',
  scarlet:'#C82020',crimson:'#A01830',magenta:'#C030A0',violet:'#6030C0',
  cerulean:'#2080C0',cobalt:'#2048A8',emerald:'#208050',sage:'#80A870',
  ecru:'#C8B890',cream:'#F0EAD0',caramel:'#C08040',russet:'#904030'
};

function guessColor(name) {
  if (!name) return '#888780';
  const l = name.toLowerCase();
  for (const [k, v] of Object.entries(DYE_COLORS)) {
    if (l.includes(k)) return v;
  }
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFF;
  return '#' + ((h & 0xBFBFBF) | 0x404040).toString(16).padStart(6, '0');
}

const PRIORITY_RANK = { 'Urgent': 0, 'High': 1, 'Normal': 2, 'Low': 3 };
function priorityRank(p) { return PRIORITY_RANK[p] ?? 2; }

function getRefId(ref) {
  if (typeof ref === 'number') return ref || null;
  if (Array.isArray(ref)) return ref[1];
  if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId;
  return null;
}

function columnAsArray(tableData, col) {
  return Array.isArray(tableData[col]) ? tableData[col] : [];
}

function normalize(s) {
  return (s || '').toString().trim().toUpperCase();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

let allLines = []; // flat per-line data: {lineId, sku, colorwayName, productName, qtyNeeded, qtyDyed, qtyWound, qtyPacked, priority, orderNumber, customerName, dueDate}
let batches = [];   // grouped by SKU: {sku, colorwayName, lines[], totalNeeded, totalDyed, totalWound, totalPacked, priority, dueDate}

async function loadEverything() {
  document.getElementById('headerSub').textContent = 'Loading...';

  try {
    const [woTable, wolTable, recipesTable] = await Promise.all([
      grist.docApi.fetchTable('Work_Orders'),
      grist.docApi.fetchTable('Work_Order_Lines'),
      grist.docApi.fetchTable('Recipes'),
    ]);

    // Build SKU -> colorway name lookup from Recipes
    const rIds = recipesTable.id || [];
    const skuToName = {};
    rIds.forEach((id, i) => {
      const name = columnAsArray(recipesTable, 'Recipe_Name')[i];
      const skuBase = normalize(columnAsArray(recipesTable, 'SKU_Base')[i]);
      const shopifySku = normalize(columnAsArray(recipesTable, 'Shopify_SKU')[i]);
      if (skuBase) skuToName[skuBase] = name;
      if (shopifySku) skuToName[shopifySku] = name;
    });

    // Active work orders only
    const woIds = woTable.id || [];
    const woActive = {};
    woIds.forEach((id, i) => {
      const status = columnAsArray(woTable, 'Status')[i];
      woActive[id] = {
        active: (status || '').toString() === 'Active',
        orderNumber: columnAsArray(woTable, 'Order_Number')[i],
        customerName: columnAsArray(woTable, 'Customer_Name')[i],
        dueDate: columnAsArray(woTable, 'Due_Date')[i],
      };
    });

    const lIds = wolTable.id || [];
    const items = [];
    for (let i = 0; i < lIds.length; i++) {
      const woId = getRefId(columnAsArray(wolTable, 'Work_Order')[i]);
      const woInfo = woActive[woId];
      if (!woInfo || !woInfo.active) continue;

      const qtyNeeded = Number(columnAsArray(wolTable, 'Qty_Needed')[i]) || 0;
      const qtyDyed = Number(columnAsArray(wolTable, 'Qty_Dyed')[i]) || 0;
      const qtyWound = Number(columnAsArray(wolTable, 'Qty_Wound')[i]) || 0;
      const qtyPacked = Number(columnAsArray(wolTable, 'Qty_Packed')[i]) || 0;

      if (qtyPacked >= qtyNeeded && qtyNeeded > 0) continue; // fully complete, hide

      const sku = columnAsArray(wolTable, 'SKU')[i] || '';
      items.push({
        lineId: lIds[i],
        sku,
        colorwayName: skuToName[normalize(sku)] || null,
        productName: columnAsArray(wolTable, 'Product_Name')[i] || '',
        qtyNeeded, qtyDyed, qtyWound, qtyPacked,
        priority: columnAsArray(wolTable, 'Production_Priority')[i] || 'Normal',
        orderNumber: woInfo.orderNumber,
        customerName: woInfo.customerName,
        dueDate: woInfo.dueDate,
      });
    }

    allLines = items;
    buildBatches();

    document.getElementById('headerSub').textContent =
      `${batches.length} colorway${batches.length === 1 ? '' : 's'} to work on · ${items.length} order line${items.length === 1 ? '' : 's'} total`;
    renderList();
  } catch (e) {
    console.error('Failed to load work list:', e);
    document.getElementById('headerSub').textContent = 'Failed to load — check table/column names';
  }
}

function buildBatches() {
  const groups = {};
  allLines.forEach(line => {
    const key = normalize(line.sku);
    if (!groups[key]) groups[key] = { sku: line.sku, colorwayName: line.colorwayName, lines: [] };
    groups[key].lines.push(line);
  });

  batches = Object.values(groups).map(g => {
    // Fill order within a batch: most urgent, soonest-due order first
    g.lines.sort((a, b) => {
      const pr = priorityRank(a.priority) - priorityRank(b.priority);
      if (pr !== 0) return pr;
      const ad = a.dueDate ? Number(a.dueDate) : Infinity;
      const bd = b.dueDate ? Number(b.dueDate) : Infinity;
      return ad - bd;
    });

    const totalNeeded = g.lines.reduce((s, l) => s + l.qtyNeeded, 0);
    const totalDyed = g.lines.reduce((s, l) => s + l.qtyDyed, 0);
    const totalWound = g.lines.reduce((s, l) => s + l.qtyWound, 0);
    const totalPacked = g.lines.reduce((s, l) => s + l.qtyPacked, 0);

    let bestPriority = g.lines[0].priority;
    g.lines.forEach(l => { if (priorityRank(l.priority) < priorityRank(bestPriority)) bestPriority = l.priority; });

    let earliestDue = null;
    g.lines.forEach(l => {
      if (!l.dueDate) return;
      const d = Number(l.dueDate);
      if (earliestDue === null || d < earliestDue) earliestDue = d;
    });

    return {
      sku: g.sku, colorwayName: g.colorwayName, lines: g.lines,
      totalNeeded, totalDyed, totalWound, totalPacked,
      priority: bestPriority, dueDate: earliestDue,
    };
  });

  batches.sort((a, b) => {
    const pr = priorityRank(a.priority) - priorityRank(b.priority);
    if (pr !== 0) return pr;
    const ad = a.dueDate ?? Infinity;
    const bd = b.dueDate ?? Infinity;
    if (ad !== bd) return ad - bd;
    return (a.colorwayName || a.sku || '').localeCompare(b.colorwayName || b.sku || '');
  });
}

function renderList() {
  const content = document.getElementById('content');
  const q = normalize(document.getElementById('searchBox').value);
  const priorityFilterVal = document.getElementById('priorityFilter').value;

  const filtered = batches
    .map((b, idx) => ({ b, idx }))
    .filter(({ b }) => {
      if (priorityFilterVal && b.priority !== priorityFilterVal) return false;
      if (!q) return true;
      return normalize(b.colorwayName).includes(q) ||
             normalize(b.sku).includes(q) ||
             b.lines.some(l => normalize(l.customerName).includes(q) || normalize(l.orderNumber).includes(q));
    });

  if (!filtered.length) {
    content.innerHTML = `<div class="empty-state">${batches.length ? 'Nothing matches that search/filter.' : '🎉 Nothing left in the queue right now.'}</div>`;
    return;
  }

  const miniStage = (idx, current, cap, field) => `
    <div class="mini-track"><div class="mini-fill" style="width:${cap > 0 ? Math.min(100, (current / cap) * 100) : 0}%"></div></div>
    <input class="stage-input-table" type="number" min="0" max="${cap}" value="${current}"
      onclick="event.stopPropagation()" onchange="setBatchStage(${idx}, '${field}', this.value, ${cap})">
    <span class="cap-text">/${cap}</span>
  `;

  const rows = filtered.map(({ b: batch, idx }) => {
    const priorityClass = (batch.priority || 'normal').toLowerCase();
    const rowPriorityClass = priorityClass === 'urgent' ? 'priority-urgent' : priorityClass === 'high' ? 'priority-high' : '';
    const dueLabel = batch.dueDate ? new Date(batch.dueDate * 1000).toLocaleDateString() : '—';
    const orderCount = batch.lines.length;
    const rowId = `batch-detail-${idx}`;

    const ordersRows = batch.lines.map(l => {
      const lDue = l.dueDate ? new Date(Number(l.dueDate) * 1000).toLocaleDateString() : '—';
      const packPct = l.qtyWound > 0 ? Math.min(100, (l.qtyPacked / l.qtyWound) * 100) : 0;
      return `
        <div class="order-row-block">
          <div class="order-row">
            <span>#${l.orderNumber || '—'} · ${l.customerName || '—'}</span>
            <span>${l.qtyNeeded} needed · due ${lDue}</span>
          </div>
          <div class="line-pack-row">
            <span class="line-pack-label">Pack</span>
            <div class="line-pack-track"><div class="line-pack-fill" style="width:${packPct}%"></div></div>
            <input class="line-pack-input" type="number" min="0" max="${l.qtyWound}" value="${l.qtyPacked}"
              onclick="event.stopPropagation()" onchange="setLinePack(${l.lineId}, this.value, ${l.qtyWound})">
            <span class="line-pack-cap">/${l.qtyWound} wound</span>
          </div>
        </div>
      `;
    }).join('');

    return `
      <tr class="batch-row ${rowPriorityClass}" onclick="document.getElementById('${rowId}').classList.toggle('open')">
        <td>
          <div class="colorway-name" style="color:${guessColor(batch.colorwayName || batch.sku)}">${batch.colorwayName || batch.sku}</div>
          <div class="colorway-sku">${batch.sku}</div>
        </td>
        <td><span class="priority-badge ${priorityClass}">${batch.priority}</span></td>
        <td class="due-cell">${dueLabel}</td>
        <td class="stage-cell">${miniStage(idx, batch.totalDyed, batch.totalNeeded, 'Qty_Dyed')}</td>
        <td class="stage-cell">${miniStage(idx, batch.totalWound, batch.totalDyed, 'Qty_Wound')}</td>
        <td class="orders-cell">▾ ${orderCount} order${orderCount === 1 ? '' : 's'} · ${batch.totalPacked}/${batch.totalNeeded} packed</td>
      </tr>
      <tr class="detail-row" id="${rowId}">
        <td colspan="6">
          <div class="detail-wrap">
            <div class="pack-summary">Pack progress per order:</div>
            ${ordersRows}
          </div>
        </td>
      </tr>
    `;
  }).join('');

  content.innerHTML = `
    <table class="work-table">
      <thead>
        <tr>
          <th>Colorway</th>
          <th>Priority</th>
          <th>Due</th>
          <th>Dye</th>
          <th>Wind</th>
          <th style="text-align:right">Orders / Pack</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function stageFieldKey(field) {
  return { Qty_Dyed: 'qtyDyed', Qty_Wound: 'qtyWound', Qty_Packed: 'qtyPacked' }[field];
}
function stageCapForLine(line, field) {
  if (field === 'Qty_Dyed') return line.qtyNeeded;
  if (field === 'Qty_Wound') return line.qtyDyed;
  if (field === 'Qty_Packed') return line.qtyWound;
  return 0;
}
function batchTotalKey(field) {
  return { Qty_Dyed: 'totalDyed', Qty_Wound: 'totalWound', Qty_Packed: 'totalPacked' }[field];
}

function distributeDelta(batch, field, delta) {
  const key = stageFieldKey(field);
  const changes = [];
  let remaining = delta;

  if (delta > 0) {
    for (const line of batch.lines) {
      if (remaining <= 0) break;
      const cap = stageCapForLine(line, field);
      const room = cap - line[key];
      if (room <= 0) continue;
      const take = Math.min(room, remaining);
      line[key] += take;
      remaining -= take;
      changes.push({ lineId: line.lineId, field, newVal: line[key] });
    }
  } else if (delta < 0) {
    let toRemove = -delta;
    for (let i = batch.lines.length - 1; i >= 0 && toRemove > 0; i--) {
      const line = batch.lines[i];
      const take = Math.min(line[key], toRemove);
      if (take <= 0) continue;
      line[key] -= take;
      toRemove -= take;
      changes.push({ lineId: line.lineId, field, newVal: line[key] });
    }
  }
  return changes;
}

function recomputeBatchTotals(batch) {
  batch.totalDyed = batch.lines.reduce((s, l) => s + l.qtyDyed, 0);
  batch.totalWound = batch.lines.reduce((s, l) => s + l.qtyWound, 0);
  batch.totalPacked = batch.lines.reduce((s, l) => s + l.qtyPacked, 0);
}

async function adjustBatchStage(batchIdx, field, delta) {
  const batch = batches[batchIdx];
  if (!batch) return;

  const changes = distributeDelta(batch, field, delta);
  if (!changes.length) return;

  recomputeBatchTotals(batch);
  renderList();

  try {
    await grist.docApi.applyUserActions(
      changes.map(c => ['UpdateRecord', 'Work_Order_Lines', c.lineId, { [c.field]: c.newVal }])
    );
  } catch (e) {
    console.error('Failed to update:', e);
    showToast('Update failed — check widget access level');
    distributeDelta(batch, field, -delta);
    recomputeBatchTotals(batch);
    renderList();
  }
}

async function setLinePack(lineId, rawValue, cap) {
  const line = allLines.find(l => l.lineId === lineId);
  if (!line) return;

  const oldVal = line.qtyPacked;
  const newVal = Math.max(0, Math.min(cap, parseInt(rawValue, 10) || 0));
  if (newVal === oldVal) { renderList(); return; }

  line.qtyPacked = newVal;
  const batch = batches.find(b => b.lines.includes(line));
  if (batch) recomputeBatchTotals(batch);
  renderList();

  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Work_Order_Lines', lineId, { Qty_Packed: newVal }]
    ]);
    showToast(`Packed set to ${newVal} for order #${line.orderNumber || ''}`);
  } catch (e) {
    console.error('Failed to update:', e);
    showToast('Update failed — check widget access level');
    line.qtyPacked = oldVal;
    if (batch) recomputeBatchTotals(batch);
    renderList();
  }
}

async function setBatchStage(batchIdx, field, rawValue, cap) {
  const batch = batches[batchIdx];
  if (!batch) return;

  const totalKey = batchTotalKey(field);
  const currentTotal = batch[totalKey];
  const newTotal = Math.max(0, Math.min(cap, parseInt(rawValue, 10) || 0));
  const delta = newTotal - currentTotal;

  if (delta === 0) { renderList(); return; }
  await adjustBatchStage(batchIdx, field, delta);
  showToast(`${field.replace('Qty_', '')} set to ${newTotal}`);
}

// ── GRIST INTEGRATION ──
grist.ready({
  requiredAccess: 'full'
});
