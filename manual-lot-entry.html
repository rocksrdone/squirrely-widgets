<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Lot Entry</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1A1614;
    --paper: #F7F3EE;
    --warm: #E8DFD4;
    --rule: #D4C9BC;
    --accent: #8B3A2A;
    --teal: #3A8B7A;
    --teal-light: #E5F2EF;
    --done-text: #27500A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
  }

  .header-title { font-family: 'Libre Baskerville', serif; font-size: 19px; font-weight: 700; margin-bottom: 2px; }
  .header-sub { font-size: 11px; color: #8B7D72; margin-bottom: 14px; }

  .field-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: #8B7D72; margin: 10px 0 4px;
  }
  .field-label:first-of-type { margin-top: 0; }

  .field-input, .field-select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--rule); border-radius: 6px;
    font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: white; color: var(--ink); color-scheme: light;
  }
  .field-select option { background: white; color: var(--ink); }
  .field-input:focus, .field-select:focus { border-color: var(--accent); }

  .recipe-search-wrap { position: relative; }
  .recipe-suggestions {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
    border: 1px solid var(--rule); border-radius: 8px; background: white; max-height: 220px; overflow-y: auto; z-index: 10;
  }
  .recipe-suggestion-row { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--warm); font-size: 12px; }
  .recipe-suggestion-row:last-child { border-bottom: none; }
  .recipe-suggestion-row:hover { background: var(--warm); }

  .recipe-chip {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--teal-light); border: 1px solid var(--teal); border-radius: 6px; padding: 8px 10px; font-size: 13px;
  }
  .change-link { font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 600; }
  .change-link:hover { text-decoration: underline; }

  .submit-btn {
    width: 100%; margin-top: 16px; font-size: 13px; padding: 10px; border-radius: 6px;
    border: 1px solid var(--teal); background: var(--teal-light); color: var(--teal); cursor: pointer; font-weight: 700;
  }
  .submit-btn:hover { background: var(--teal); color: white; }

  .recent-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    color: #8B7D72; margin: 20px 0 6px; padding-top: 12px; border-top: 1px dashed var(--rule);
  }
  .recent-row {
    display: flex; justify-content: space-between; align-items: center; background: white;
    border: 1px solid var(--rule); border-radius: 6px; padding: 7px 10px; margin-bottom: 5px; font-size: 12px;
  }
  .recent-remove { font-size: 10px; color: var(--accent); cursor: pointer; font-weight: 600; }
  .recent-remove:hover { text-decoration: underline; }
  .no-recent { font-size: 11px; color: #8B7D72; font-style: italic; }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px;
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header-title">Manual Lot Entry</div>
<div class="header-sub">Backfill lots that were already made before this system existed</div>

<div class="field-label">Recipe</div>
<div id="recipeField"></div>

<div class="field-label">Lot number</div>
<input class="field-input" id="lotNumber" placeholder="e.g. 20260707-1">

<div class="field-label">Lot date</div>
<input class="field-input" id="lotDate" type="date">

<div class="field-label">Total spools made</div>
<input class="field-input" id="totalSpools" type="number" min="0" placeholder="Spools">

<div class="field-label">Form</div>
<select class="field-select" id="lotForm">
  <option value="Wound Spools">Wound Spools</option>
  <option value="Hank Backstock">Hank Backstock</option>
</select>

<div class="field-label">Drying / assignment status</div>
<select class="field-select" id="dryingStatus">
  <option value="Ready to Assign" selected>Ready to Assign (already done)</option>
  <option value="Drying - Day Rack">Drying - Day Rack</option>
  <option value="Drying - Overnight">Drying - Overnight</option>
</select>

<button class="submit-btn" onclick="submitLot()">✓ Add this lot</button>

<div class="recent-title">Recently added</div>
<div id="recentList"></div>

<div class="toast" id="toast"></div>

<script>
function getRefId(ref) {
  if (typeof ref === 'number') return ref || null;
  if (Array.isArray(ref)) return ref[1];
  if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId;
  return null;
}
function columnAsArray(t, c) { return Array.isArray(t[c]) ? t[c] : []; }
function normalize(s) { return (s || '').toString().trim().toUpperCase(); }

const YARDS_PER_SPOOL = {
  'FF NYLON': 100,
  'E NYLON': 150,
  'FF COTTON': 100,
  'BLACKWING': 100,
};
function yardsPerSpool(fiberType) {
  return YARDS_PER_SPOOL[normalize(fiberType)] || 100;
}

let allRecipes = [];
let selectedRecipe = null;
let recentLots = [];

function todayDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function generateDefaultLotNumber() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}-backfill`;
}

function renderRecipeField() {
  const wrap = document.getElementById('recipeField');
  if (selectedRecipe) {
    wrap.innerHTML = `
      <div class="recipe-chip">
        <span>${selectedRecipe.name} <span style="color:#8B7D72">(${selectedRecipe.fiberType || '—'})</span></span>
        <span class="change-link" onclick="clearRecipe()">change</span>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div class="recipe-search-wrap">
        <input class="field-input" id="recipeSearch" placeholder="Type recipe name..." oninput="searchRecipes(this.value)">
        <div class="recipe-suggestions" id="recipeSuggestions" style="display:none"></div>
      </div>`;
  }
}

function searchRecipes(query) {
  const box = document.getElementById('recipeSuggestions');
  const q = normalize(query);
  if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }

  const matches = allRecipes.filter(r => normalize(r.name).includes(q)).slice(0, 10);
  if (!matches.length) {
    box.innerHTML = `<div class="recipe-suggestion-row" style="color:#8B7D72;font-style:italic">No matches</div>`;
    box.style.display = 'block';
    return;
  }

  box.innerHTML = matches.map(r =>
    `<div class="recipe-suggestion-row" onclick="pickRecipe(${r.id})">${r.name} <span style="color:#8B7D72">(${r.fiberType || '—'})</span></div>`
  ).join('');
  box.style.display = 'block';
}

function pickRecipe(recipeId) {
  selectedRecipe = allRecipes.find(r => r.id === recipeId);
  renderRecipeField();
}

function clearRecipe() {
  selectedRecipe = null;
  renderRecipeField();
}

async function loadRecipes() {
  const recipesTable = await grist.docApi.fetchTable('Recipes');
  const ids = recipesTable.id || [];
  allRecipes = ids.map((id, i) => ({
    id,
    name: columnAsArray(recipesTable, 'Recipe_Name')[i],
    fiberType: columnAsArray(recipesTable, 'Fiber_Type')[i],
  })).filter(r => r.name);
}

async function loadRecentLots() {
  const lotsTable = await grist.docApi.fetchTable('Production_Lots');
  const recipesTable = await grist.docApi.fetchTable('Recipes');
  const rIds = recipesTable.id || [];
  const recipeNameById = {};
  rIds.forEach((id, i) => { recipeNameById[id] = columnAsArray(recipesTable, 'Recipe_Name')[i]; });

  const lIds = lotsTable.id || [];
  recentLots = lIds.map((id, i) => ({
    id,
    lotNumber: columnAsArray(lotsTable, 'Lot_Number')[i],
    recipeName: recipeNameById[getRefId(columnAsArray(lotsTable, 'Recipe')[i])] || '—',
    totalYards: Number(columnAsArray(lotsTable, 'Total_Yards_Made')[i]) || 0,
  })).sort((a, b) => b.id - a.id).slice(0, 15);

  renderRecentList();
}

function renderRecentList() {
  const wrap = document.getElementById('recentList');
  if (!recentLots.length) {
    wrap.innerHTML = `<div class="no-recent">Nothing entered yet.</div>`;
    return;
  }
  wrap.innerHTML = recentLots.map(l => `
    <div class="recent-row">
      <span>${l.lotNumber} — ${l.recipeName} (${l.totalYards}yd)</span>
      <span class="recent-remove" onclick="removeLot(${l.id})">✕ remove</span>
    </div>
  `).join('');
}

async function submitLot() {
  if (!selectedRecipe) { showToast('Pick a recipe first'); return; }

  const lotNumberInput = document.getElementById('lotNumber').value.trim();
  const lotNumber = lotNumberInput || generateDefaultLotNumber();
  const dateInput = document.getElementById('lotDate').value;
  const spools = Number(document.getElementById('totalSpools').value) || 0;
  const form = document.getElementById('lotForm').value;
  const dryingStatus = document.getElementById('dryingStatus').value;

  if (spools <= 0) { showToast('Enter how many spools were made'); return; }

  const ySpool = yardsPerSpool(selectedRecipe.fiberType);
  const totalYards = spools * ySpool;
  const lotDateSeconds = dateInput
    ? Math.floor(new Date(dateInput + 'T12:00:00').getTime() / 1000)
    : Math.floor(Date.now() / 1000);

  try {
    await grist.docApi.applyUserActions([
      ['AddRecord', 'Production_Lots', null, {
        Lot_Number: lotNumber,
        Recipe: selectedRecipe.id,
        Lot_Date: lotDateSeconds,
        Total_Yards_Made: totalYards,
        Form: form,
        Drying_Status: dryingStatus,
        Listed_Vendor_Store: false,
        Listed_Regular_Store: false,
      }]
    ]);
    showToast(`Added lot ${lotNumber} — ${spools} spools ✓`);

    document.getElementById('lotNumber').value = '';
    document.getElementById('totalSpools').value = '';
    clearRecipe();
    await loadRecentLots();
  } catch (e) {
    console.error('Failed to add lot:', e);
    showToast('Failed — check the Production_Lots table');
  }
}

async function removeLot(lotId) {
  try {
    await grist.docApi.applyUserActions([['RemoveRecord', 'Production_Lots', lotId]]);
    showToast('Removed ✓');
    await loadRecentLots();
  } catch (e) {
    console.error('Failed to remove lot:', e);
    showToast('Failed to remove — check the Production_Lots table');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

grist.ready({
  requiredAccess: 'full'
});

(async () => {
  document.getElementById('lotDate').value = todayDateStr();
  renderRecipeField();
  await loadRecipes();
  await loadRecentLots();
})();
</script>
</body>
</html>
