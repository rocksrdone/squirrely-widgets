<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Assignment</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --ink: #1A1614;
  --paper: #F7F3EE;
  --warm: #E8DFD4;
  --rule: #D4C9BC;
  --accent: #8B3A2A;
  --teal: #3A8B7A;
  --teal-light: #E5F2EF;
  --done-text: #27500A;
  --done-bg: #EAF3DE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  line-height: 1.4;
  padding: 8px;
}
.header-title { font-family: 'Libre Baskerville', serif; font-size: 14px; font-weight: 700; }
.header-sub { font-size: 10px; color: #8B7D72; margin-bottom: 6px; }
.empty-state { text-align: center; color: #8B7D72; padding: 24px 12px; font-size: 12px; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  color: #8B7D72; margin: 8px 0 4px; padding-top: 6px; border-top: 1px dashed var(--rule);
}
.section-title:first-of-type { margin-top: 4px; }
.order-card {
  background: white; border: 1px solid var(--rule); border-radius: 6px; padding: 6px 8px; margin-bottom: 5px;
}
.order-top { display: flex; justify-content: space-between; align-items: center; }
.order-customer { font-weight: 600; font-size: 12px; }
.order-progress { font-family: 'DM Mono', monospace; font-size: 11px; color: #8B7D72; }
.order-progress.complete { color: var(--done-text); font-weight: 700; }
.order-log-row { display: flex; gap: 5px; align-items: center; margin-top: 4px; }
.order-log-row input {
  flex: 1; padding: 4px 6px; border: 1px solid var(--rule); border-radius: 4px; font-size: 12px;
}
.log-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--teal); background: var(--teal-light); color: var(--teal); cursor: pointer; font-weight: 600;
}
.log-btn:hover { background: var(--teal); color: white; }
.order-confirm {
  font-size: 10px; color: var(--done-text); margin-top: 3px; display: flex; justify-content: space-between; align-items: center;
}
.undo-link { color: var(--accent); cursor: pointer; font-weight: 600; }
.undo-link:hover { text-decoration: underline; }
.cleanup-row { font-size: 11px; padding: 4px 6px; border-radius: 5px; margin-bottom: 3px; }
.cleanup-oneoff { background: #F5E0E4; color: #A01830; }
.cleanup-keep { background: var(--teal-light); color: var(--teal); }
.cleanup-stage { background: #1A1614; color: #F7F3EE; }
.cleanup-stage .slot-tag { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: .06em; }
.dye-action-row { margin-bottom: 8px; }
.action-done-banner {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--done-bg); border: 1px solid var(--done-text); border-radius: 5px;
  padding: 6px 10px; font-size: 11px; color: var(--done-text); font-weight: 600;
}
.undo-link { color: var(--accent); cursor: pointer; text-decoration: underline; font-weight: 600; }
.undo-link:hover { opacity: .8; }
.dye-action-row select {
  width: 100%; padding: 4px 6px; border: 1px solid var(--rule); border-radius: 4px; font-size: 11px;
  background: white; color: var(--ink); color-scheme: light;
}
.dye-action-row select option {
  background: white; color: var(--ink);
}
.action-fields { display: flex; gap: 5px; margin-top: 4px; }
.action-fields input {
  flex: 1; padding: 4px 6px; border: 1px solid var(--rule); border-radius: 4px; font-size: 11px;
}
.action-confirm-btn {
  font-size: 11px; padding: 4px 10px; border-radius: 4px; white-space: nowrap;
  border: 1px solid var(--teal); background: var(--teal-light); color: var(--teal); cursor: pointer; font-weight: 600;
}
.action-confirm-btn:hover { background: var(--teal); color: white; }
.toast {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px;
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="content">
  <div class="empty-state">Select a colorway in Morning Batch Planning to see details here.</div>
</div>
<div class="toast" id="toast"></div>

<script>
function getRefId(ref) {
  if (typeof ref === 'number') return ref || null;
  if (Array.isArray(ref)) return ref[1];
  if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId;
  return null;
}
function columnAsArray(t, c) { return Array.isArray(t[c]) ? t[c] : []; }
function normalize(s) { return (s || '').toString().trim().toUpperCase(); }
// Byte-identical copy of the helper in batch-planner.html — keep them in sync.
// Matches a column id ignoring case and non-alphanumerics, trying each candidate.
function findColumn(t, candidates) {
  const keys = Object.keys(t);
  for (const cand of candidates) {
    const hit = keys.find(k => k.toLowerCase().replace(/[^a-z0-9]/g, '') === cand.toLowerCase().replace(/[^a-z0-9]/g, ''));
    if (hit) return hit;
  }
  return null;
}
// Resolve a table's columns by trying candidate ids. spec maps a logical key to
// either ['Cand1','Cand2'] (required) or { cands:[...], required:false } (optional).
// Returns { key: actualColId|null }; pushes "Table.FirstCand" into `missing` for any
// REQUIRED column that isn't found, so the widget can banner instead of silently
// reading an empty column after a rename.
function resolveCols(table, tableName, spec, missing) {
  const out = {};
  for (const [key, def] of Object.entries(spec)) {
    const cands = Array.isArray(def) ? def : def.cands;
    const required = Array.isArray(def) ? true : def.required !== false;
    const hit = findColumn(table, cands);
    out[key] = hit;
    if (!hit && required) missing.push(`${tableName}.${cands[0]}`);
  }
  return out;
}
// Resolved Dye_Stock column ids, stashed at load time so the put/hold/dump/undo
// actions (which run later, outside loadForRecipe's scope) use the same ids.
let RC_STOCK = null;
// Resolved Dye_Stock column id for a logical key, falling back to the canonical
// name (so a brand-new doc missing an optional column can still have it created).
function stockCol(key, fallback) { return (RC_STOCK && RC_STOCK[key]) || fallback; }

// ── PREP TABLE CONFIG ──────────────────────────────────────────────
// Must match PREP_ZONES in batch-planner.html. Staging advice is only given
// when the next use of a dye is fewer than this many groups ahead — past that,
// the slot has already rotated round to something else.
const PREP_ZONES = 3;
// ───────────────────────────────────────────────────────────────────

// Grist Date columns store epoch seconds at UTC midnight of the calendar day.
function todayEpochSeconds() {
  const n = new Date();
  return Date.UTC(n.getFullYear(), n.getMonth(), n.getDate()) / 1000;
}

// ── PREP ZONE ALLOCATION ───────────────────────────────────────────
// Byte-identical copy of the function in batch-planner.html — keep them in sync.
// See that file for the full explanation.
function allocatePrepZones(recipeIds, dyesForRecipe, zoneCount) {
  const zones = new Array(zoneCount).fill(null); // zone index -> dyeId
  const steps = [];

  function nextUseAtOrAfter(dyeId, fromIdx) {
    for (let i = fromIdx; i < recipeIds.length; i++) {
      if ((dyesForRecipe(recipeIds[i]) || []).includes(dyeId)) return i;
    }
    return Infinity;
  }

  recipeIds.forEach((rid, idx) => {
    const needed = (dyesForRecipe(rid) || []).slice();
    const overflow = [];
    needed.forEach(dyeId => {
      if (zones.indexOf(dyeId) >= 0) return; // already on the bench
      let slotIdx = zones.indexOf(null);
      if (slotIdx < 0) {
        let worstZone = -1, worstNext = -1;
        zones.forEach((resident, zi) => {
          if (needed.indexOf(resident) >= 0) return; // still needed right now
          const nu = nextUseAtOrAfter(resident, idx + 1);
          if (nu > worstNext) { worstNext = nu; worstZone = zi; }
        });
        // More dyes in one recipe than there are zones — the extras just
        // don't get a spot, and fall through to normal bin handling.
        if (worstZone < 0) { overflow.push(dyeId); return; }
        slotIdx = worstZone;
      }
      zones[slotIdx] = dyeId;
    });
    steps.push({ recipeId: rid, zones: zones.slice(), overflow });
  });
  return steps;
}
// ───────────────────────────────────────────────────────────────────

let currentEntry = null;
let lastLoggedDelta = {}; // lineId -> amount just added, for undo
let completedActions = {}; // cleanupInfo idx -> {label, undo: asyncFn} for dye cleanup actions

async function loadForRecipe(record) {
  if (!record || !record.id) {
    document.getElementById('content').innerHTML = `<div class="empty-state">Select a colorway in Morning Batch Planning to see details here.</div>`;
    currentEntry = null;
    return;
  }
  document.getElementById('content').innerHTML = `<div class="empty-state">Loading...</div>`;

  try {
    const [woTable, wolTable, compTable, recipesTable, dyesTable, stockTableUpfront] = await Promise.all([
      grist.docApi.fetchTable('Work_Orders'),
      grist.docApi.fetchTable('Work_Order_Lines'),
      grist.docApi.fetchTable('Recipe_Dye_Components'),
      grist.docApi.fetchTable('Recipes'),
      grist.docApi.fetchTable('Dyes'),
      grist.docApi.fetchTable('Dye_Stock'),
    ]);

    // ── Resolve every column id up front (rename-proofing) ──────────────
    // Required columns missing => named banner, not a silently-empty widget.
    // Optional (display-only / fallback-path) columns just degrade quietly.
    const missing = [];
    const opt = cands => ({ cands, required: false });
    const DYE = resolveCols(dyesTable, 'Dyes', {
      name: ['Dye_Name'], brand: opt(['Brand']), serial: opt(['Serial']), dyeType: opt(['Dye_Type']),
    }, missing);
    const WO = resolveCols(woTable, 'Work_Orders', {
      status: ['Status'], orderNumber: opt(['Order_Number']), customerName: opt(['Customer_Name']),
    }, missing);
    const REC = resolveCols(recipesTable, 'Recipes', {
      name: ['Recipe_Name'], sku: opt(['SKU_Base']), fiber: opt(['Fiber_Type']),
    }, missing);
    const COMP = resolveCols(compTable, 'Recipe_Dye_Components', {
      recipe: ['Recipe'], dye: ['Dye_Name'], powder: opt(['Is_Powder', 'Powder']),
    }, missing);
    const WOL = resolveCols(wolTable, 'Work_Order_Lines', {
      workOrder: ['Work_Order'], qtyNeeded: ['Qty_Needed'], qtyDyed: ['Qty_Dyed'],
      recipe: opt(['Recipe']), sku: opt(['SKU']),
    }, missing);
    const STOCK = resolveCols(stockTableUpfront, 'Dye_Stock', {
      dye: ['Dye'], quantity: ['Quantity_mL'], bin: opt(['Bin_Location']), mixedDate: opt(['Mixed_Date']),
    }, missing);
    RC_STOCK = STOCK; // used later by put/hold/dump/undo

    if (missing.length) {
      document.getElementById('content').innerHTML =
        `<div class="empty-state">Can't load — these expected columns are missing:<br><br>` +
        `<strong>${[...new Set(missing)].join('<br>')}</strong><br><br>` +
        `<span style="font-size:10px;color:#8B7D72">A table or column was likely renamed. Fix the name in Grist, or update the widget.</span></div>`;
      currentEntry = null;
      return;
    }
    // ────────────────────────────────────────────────────────────────────

    // Dye_Name on Recipe_Dye_Components is a Ref:Dyes link — resolve it through
    // this table to get the actual name/brand/serial/type, rather than displaying
    // the raw row id.
    const dIds = dyesTable.id || [];
    const dyeInfoById = {};
    dIds.forEach((id, i) => {
      dyeInfoById[id] = {
        name: columnAsArray(dyesTable, DYE.name)[i] || '',
        brand: columnAsArray(dyesTable, DYE.brand)[i] || '',
        serial: columnAsArray(dyesTable, DYE.serial)[i] || '',
        dyeType: columnAsArray(dyesTable, DYE.dyeType)[i] || '',
      };
    });
    function dyeShortName(dyeId) {
      const d = dyeInfoById[dyeId];
      return d && d.name ? d.name : `Dye #${dyeId}`;
    }
    function dyeDisplayLabel(dyeId) {
      const d = dyeInfoById[dyeId];
      if (!d) return `Dye #${dyeId}`;
      return [d.name, d.brand, d.serial, d.dyeType].filter(Boolean).join(' · ');
    }

    const woIds = woTable.id || [];
    const woInfo = {};
    woIds.forEach((id, i) => {
      woInfo[id] = {
        active: (columnAsArray(woTable, WO.status)[i] || '').toString() === 'Active',
        orderNumber: columnAsArray(woTable, WO.orderNumber)[i],
        customerName: columnAsArray(woTable, WO.customerName)[i],
      };
    });

    const rIds = recipesTable.id || [];
    const recipeNameById = {};
    const recipeSkuById = {};
    const recipeFiberById = {};
    rIds.forEach((id, i) => {
      recipeNameById[id] = columnAsArray(recipesTable, REC.name)[i];
      recipeSkuById[id] = normalize(columnAsArray(recipesTable, REC.sku)[i] || '');
      recipeFiberById[id] = columnAsArray(recipesTable, REC.fiber)[i];
    });
    const recipeIdBySku = {};
    Object.entries(recipeSkuById).forEach(([id, sku]) => { if (sku) recipeIdBySku[sku] = Number(id); });

    // recipeId -> [dyeId, dyeId, ...] — dyeId is the real Dyes row id, resolved via getRefId
    // Is_Powder = sprinkled dry. Powder dyes come off an alphabetical rack, not the
    // prep bench: no zone, no reuse grouping, no bin. Skip them here so this map
    // stays identical to batch-planner's, and allocatePrepZones agrees across both.
    const cIds = compTable.id || [];
    const dyesByRecipeId = {};
    cIds.forEach((id, i) => {
      const recipeRef = getRefId(columnAsArray(compTable, COMP.recipe)[i]);
      const dyeRef = getRefId(columnAsArray(compTable, COMP.dye)[i]);
      if (!recipeRef || !dyeRef) return;
      if (COMP.powder && columnAsArray(compTable, COMP.powder)[i]) return;
      if (!dyesByRecipeId[recipeRef]) dyesByRecipeId[recipeRef] = [];
      if (!dyesByRecipeId[recipeRef].includes(dyeRef)) dyesByRecipeId[recipeRef].push(dyeRef);
    });

    // Which dyes get used together in the same recipe — used to group bin suggestions.
    const coUsedDyes = {};
    Object.values(dyesByRecipeId).forEach(dyeList => {
      dyeList.forEach(d1 => {
        if (!coUsedDyes[d1]) coUsedDyes[d1] = new Set();
        dyeList.forEach(d2 => { if (d2 !== d1) coUsedDyes[d1].add(d2); });
      });
    });

    const dyeIds = dyesByRecipeId[record.id] || [];
    // Read the selected recipe's SKU from the resolved Recipes table rather than the
    // raw onRecord payload, so a SKU_Base rename doesn't silently break matching.
    const recipeSku = recipeSkuById[record.id] || '';

    const wolIds = wolTable.id || [];
    const orders = [];
    const pendingRecipeIds = new Set();

    for (let i = 0; i < wolIds.length; i++) {
      const woId = getRefId(columnAsArray(wolTable, WOL.workOrder)[i]);
      const info = woInfo[woId];
      if (!info || !info.active) continue;

      const qtyNeeded = Number(columnAsArray(wolTable, WOL.qtyNeeded)[i]) || 0;
      const qtyDyed = Number(columnAsArray(wolTable, WOL.qtyDyed)[i]) || 0;
      const directRecipeId = getRefId(columnAsArray(wolTable, WOL.recipe)[i]);
      const sku = normalize(columnAsArray(wolTable, WOL.sku)[i] || '');
      const lineRecipeId = directRecipeId || recipeIdBySku[sku] || null;
      if (lineRecipeId) pendingRecipeIds.add(lineRecipeId);

      const matches = directRecipeId === record.id || (recipeSku && sku === recipeSku);
      if (!matches) continue;
      if (qtyDyed >= qtyNeeded) continue; // fully done, don't clutter the list

      orders.push({
        lineId: wolIds[i],
        orderNumber: info.orderNumber,
        customerName: info.customerName,
        qtyNeeded,
        qtyDyed,
      });
    }

    // Bin suggestion — prefer a bin that already holds only this dye and has room,
    // computed upfront so it can show right in the row, not just after a click.
    const BIN_CAPACITY = 12;
    const GENERIC_FILL_CAP = 6;
    const stockEntries = [];
    (stockTableUpfront.id || []).forEach((id, i) => {
      stockEntries.push({
        dyeRef: getRefId(columnAsArray(stockTableUpfront, STOCK.dye)[i]),
        bin: columnAsArray(stockTableUpfront, STOCK.bin)[i] || '',
      });
    });
    function isTrueOneOff(dyeId) {
      const coUsed = coUsedDyes[dyeId];
      return !coUsed || coUsed.size === 0;
    }

    function suggestBinFor(dyeId) {
      const binGroups = {};
      stockEntries.forEach(s => {
        const bin = (s.bin || '').toString().trim();
        if (!bin) return;
        if (!binGroups[bin]) binGroups[bin] = [];
        binGroups[bin].push(s);
      });
      // 1. Prefer a bin that already has this same dye and still has room.
      for (const [bin, entries] of Object.entries(binGroups)) {
        if (entries.some(e => e.dyeRef === dyeId) && entries.length < BIN_CAPACITY) {
          return { bin, note: 'already has this dye' };
        }
      }

      if (isTrueOneOff(dyeId)) {
        // Route to whichever existing bin already holds only other one-offs —
        // packed full, kept separate from the bins you actually search often.
        let catchAllBin = null;
        for (const [bin, entries] of Object.entries(binGroups)) {
          const allOneOff = entries.every(e => isTrueOneOff(e.dyeRef));
          if (allOneOff && entries.length < BIN_CAPACITY) {
            if (catchAllBin === null || Number(bin) > Number(catchAllBin)) catchAllBin = bin;
          }
        }
        if (catchAllBin) return { bin: catchAllBin, note: 'one-off — catch-all bin, out of the way' };
        const usedNumbers = Object.keys(binGroups).map(b => Number(b)).filter(n => !isNaN(n));
        const next = String(usedNumbers.length ? Math.max(...usedNumbers) + 1 : 1);
        return { bin: next, note: 'one-off — starting a new catch-all bin' };
      }

      // 2. Prefer a bin holding dyes this one is used together with in the same recipe.
      const coUsed = coUsedDyes[dyeId] || new Set();
      if (coUsed.size) {
        let bestBin = null, bestNeighbors = [];
        for (const [bin, entries] of Object.entries(binGroups)) {
          if (entries.length >= BIN_CAPACITY) continue;
          const neighbors = [...new Set(entries.filter(e => coUsed.has(e.dyeRef)).map(e => e.dyeRef))];
          if (neighbors.length > bestNeighbors.length) { bestNeighbors = neighbors; bestBin = bin; }
        }
        if (bestBin) {
          const names = bestNeighbors.map(dyeShortName).filter(Boolean);
          return { bin: bestBin, note: names.length ? `near ${names.join(', ')} — used together` : 'used together with a dye already there' };
        }
      }

      // 3. Generic fallback: only fill a bin up to the soft cap, leaving
      // headroom for a genuinely related dye to join it later.
      for (const [bin, entries] of Object.entries(binGroups)) {
        if (entries.length < GENERIC_FILL_CAP) return { bin, note: 'next open bin — leaving room for related dyes later' };
      }
      // 4. Nothing eligible — start a new bin.
      const usedNumbers = Object.keys(binGroups).map(b => Number(b)).filter(n => !isNaN(n));
      const next = String(usedNumbers.length ? Math.max(...usedNumbers) + 1 : 1);
      return { bin: next, note: 'new bin' };
    }

    // ── Today's saved plan (from Batch Planner's "Save Today's Plan") ──
    // Lets us say "keep it out, stage at P2" instead of "put it in a bin",
    // when the dye gets used again soon enough for a prep zone to still be free.
    // Missing table / no plan saved = silently fall back to bin advice.
    let planRows = [];
    try {
      const dpTable = await grist.docApi.fetchTable('Day_Plan');
      // Day_Plan is a bonus (staging advice); resolve its columns but never banner —
      // a missing/renamed column here just drops back to plain bin advice.
      const dpMissing = [];
      const DP = resolveCols(dpTable, 'Day_Plan', {
        planDate: ['Plan_Date'], recipe: ['Recipe'], sequence: ['Sequence'], slot: ['Prep_Slot'],
      }, dpMissing);
      if (dpMissing.length) throw new Error('Day_Plan columns changed: ' + dpMissing.join(', '));
      const today = todayEpochSeconds();
      (dpTable.id || []).forEach((id, i) => {
        if (Number(columnAsArray(dpTable, DP.planDate)[i]) !== today) return;
        const rid = getRefId(columnAsArray(dpTable, DP.recipe)[i]);
        if (!rid) return;
        planRows.push({
          recipeId: rid,
          seq: Number(columnAsArray(dpTable, DP.sequence)[i]) || 0,
          slot: (columnAsArray(dpTable, DP.slot)[i] || '').toString().trim(),
        });
      });
      planRows.sort((a, b) => a.seq - b.seq);
    } catch (err) {
      planRows = [];
    }

    // Day_Plan holds one row per order line, but several lines can share a
    // Sequence when two customers ordered the same colorway — that's one batch
    // at the kettle. Collapse to distinct recipes in running order, or the
    // allocator would think a dye is needed again later and hold a zone for it.
    const planRecipes = [];
    planRows.forEach(r => {
      if (planRecipes.length && planRecipes[planRecipes.length - 1] === r.recipeId) return;
      if (planRecipes.indexOf(r.recipeId) >= 0) return;
      planRecipes.push(r.recipeId);
    });

    const zoneSteps = planRecipes.length
      ? allocatePrepZones(planRecipes, rid => dyesByRecipeId[rid] || [], PREP_ZONES)
      : [];

    function stagingFor(dyeId) {
      if (!zoneSteps.length) return null;
      const meIdx = planRecipes.indexOf(record.id);
      if (meIdx < 0) return null;

      let nextIdx = -1;
      for (let i = meIdx + 1; i < planRecipes.length; i++) {
        if ((dyesByRecipeId[planRecipes[i]] || []).includes(dyeId)) { nextIdx = i; break; }
      }
      if (nextIdx < 0) return null; // not needed again today

      let stayed = true;
      for (let k = meIdx; k <= nextIdx; k++) {
        if (zoneSteps[k].zones.indexOf(dyeId) < 0) { stayed = false; break; }
      }
      const zoneIdx = zoneSteps[nextIdx].zones.indexOf(dyeId);

      return {
        slot: stayed && zoneIdx >= 0 ? 'P' + (zoneIdx + 1) : null,
        recipeName: recipeNameById[planRecipes[nextIdx]] || `Recipe #${planRecipes[nextIdx]}`,
        gap: nextIdx - meIdx,
        inReach: stayed && zoneIdx >= 0,
      };
    }

    const cleanupInfo = dyeIds.map(dyeId => {
      const others = [];
      pendingRecipeIds.forEach(rid => {
        if (rid === record.id) return;
        const otherDyeIds = dyesByRecipeId[rid] || [];
        if (otherDyeIds.includes(dyeId)) others.push(recipeNameById[rid] || `Recipe #${rid}`);
      });
      const binSuggestion = suggestBinFor(dyeId);
      return {
        dyeId,
        dyeName: dyeShortName(dyeId),
        dyeDetail: dyeDisplayLabel(dyeId),
        isOneOff: others.length === 0,
        others,
        suggestedBin: binSuggestion.bin,
        suggestedBinNote: binSuggestion.note,
        staging: stagingFor(dyeId),
      };
    });

    currentEntry = {
      recipeId: record.id,
      recipeName: recipeNameById[record.id] || record.Recipe_Name || `Recipe #${record.id}`,
      fiberType: recipeFiberById[record.id] || record.Fiber_Type || '',
      dyeCount: dyeIds.length, orders, cleanupInfo,
    };
    completedActions = {};
    render();
  } catch (e) {
    console.error('Failed to load batch assignment:', e);
    const msg = (e && e.message ? e.message : String(e)).replace(/[<>]/g, '');
    document.getElementById('content').innerHTML =
      `<div class="empty-state">Failed to load.<br><span style="font-size:10px;color:#8B7D72">${msg}</span></div>`;
  }
}

function render() {
  if (!currentEntry) {
    document.getElementById('content').innerHTML = `<div class="empty-state">Select a colorway in Morning Batch Planning to see details here.</div>`;
    return;
  }
  const e = currentEntry;

  const ordersHtml = e.orders.length
    ? e.orders.map(o => {
        const complete = o.qtyDyed >= o.qtyNeeded;
        const confirmMsg = lastLoggedDelta[o.lineId]
          ? `<div class="order-confirm"><span>✓ Registered +${lastLoggedDelta[o.lineId]}</span><span class="undo-link" onclick="undoLast(${o.lineId})">↺ undo</span></div>`
          : '';
        return `
          <div class="order-card">
            <div class="order-top">
              <span class="order-customer">${o.customerName || '—'}</span>
              <span class="order-progress ${complete ? 'complete' : ''}">${o.qtyDyed}/${o.qtyNeeded} spools</span>
            </div>
            <div class="order-log-row">
              <input type="number" id="made-${o.lineId}" placeholder="Spools just made" min="0">
              <button class="log-btn" onclick="logProgress(${o.lineId})">✓ Log</button>
            </div>
            ${confirmMsg}
          </div>`;
      }).join('')
    : `<div class="empty-state">🎉 Nothing pending for this recipe right now.</div>`;

  const cleanupHtml = e.cleanupInfo.map((c, idx) => {
    let flagHtml;
    if (c.staging && c.staging.inReach) {
      // Used again soon enough today that a prep zone will still be free for it.
      flagHtml = `<div class="cleanup-row cleanup-stage"><strong>${c.dyeDetail}</strong> — Keep out. Stage at <span class="slot-tag">${c.staging.slot}</span> (used next in ${c.staging.recipeName}). Don't put it away.</div>`;
    } else if (c.staging) {
      // Needed later today, but too many groups out — the zone rotates before then.
      flagHtml = `<div class="cleanup-row cleanup-keep"><strong>${c.dyeDetail}</strong> — needed again today in ${c.staging.recipeName} (${c.staging.gap} recipe${c.staging.gap === 1 ? '' : 's'} away), but the prep table fills up before then. <span style="font-weight:600;">Store in bin ${c.suggestedBin}</span> <span style="font-style:italic;">(${c.suggestedBinNote})</span>.</div>`;
    } else if (c.isOneOff) {
      flagHtml = `<div class="cleanup-row cleanup-oneoff"><strong>${c.dyeDetail}</strong> — one-off, nothing else pending needs it. <span style="font-weight:600;">If keeping leftover: bin ${c.suggestedBin}</span> <span style="font-style:italic;">(${c.suggestedBinNote})</span>.</div>`;
    } else {
      flagHtml = `<div class="cleanup-row cleanup-keep"><strong>${c.dyeDetail}</strong> — keep out, also needed by: ${c.others.join(', ')}. <span style="font-weight:600;">If storing leftover: bin ${c.suggestedBin}</span> <span style="font-style:italic;">(${c.suggestedBinNote})</span>.</div>`;
    }

    const done = completedActions[idx];
    const actionBlock = done
      ? `<div class="action-done-banner">
           <span>✓ ${done.label}</span>
           <span class="undo-link" onclick="undoAction(${idx})">Undo</span>
         </div>`
      : `<select id="action-${idx}" onchange="onDyeActionChange(${idx})">
           <option value="">What did you do with the leftover?</option>
           ${c.staging && c.staging.inReach ? `<option value="stage">Left it out — staged at ${c.staging.slot}</option>` : ''}
           <option value="put_away">Put away in a bin</option>
           <option value="hold">Hold for later (no bin yet)</option>
           <option value="dump">Dump it</option>
         </select>
         <div id="action-fields-${idx}"></div>`;

    return `
      ${flagHtml}
      <div class="dye-action-row">
        ${actionBlock}
      </div>
    `;
  }).join('');

  const draftActionHtml = `
    <div class="section-title">Combined leftovers into something new?</div>
    <button class="log-btn" style="width:100%;" onclick="createColorDraft()">🎨 Create new color draft from leftovers</button>
  `;

  document.getElementById('content').innerHTML = `
    <div class="header-title">${e.recipeName}</div>
    <div class="header-sub">${e.dyeCount} color${e.dyeCount === 1 ? '' : 's'}</div>
    <div class="section-title">Log progress per customer</div>
    ${ordersHtml}
    ${cleanupHtml ? `<div class="section-title">After you finish — dye cleanup</div>${cleanupHtml}${draftActionHtml}` : ''}
  `;
}

async function logProgress(lineId) {
  const input = document.getElementById(`made-${lineId}`);
  const amount = Number(input.value) || 0;
  if (amount <= 0) { showToast('Enter how many spools you just made'); return; }

  const order = currentEntry.orders.find(o => o.lineId === lineId);
  const newQtyDyed = order.qtyDyed + amount;

  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Work_Order_Lines', lineId, { Qty_Dyed: newQtyDyed }]
    ]);
    lastLoggedDelta[lineId] = amount;
    order.qtyDyed = newQtyDyed;
    input.value = '';
    render();
    showToast(`Registered +${amount} for ${order.customerName} ✓`);
  } catch (e) {
    console.error('Failed to log progress:', e);
    showToast('Failed to log — check Work_Order_Lines table');
  }
}

async function undoLast(lineId) {
  const amount = lastLoggedDelta[lineId];
  if (!amount) return;
  const order = currentEntry.orders.find(o => o.lineId === lineId);
  const revertedQtyDyed = Math.max(0, order.qtyDyed - amount);

  try {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', 'Work_Order_Lines', lineId, { Qty_Dyed: revertedQtyDyed }]
    ]);
    order.qtyDyed = revertedQtyDyed;
    delete lastLoggedDelta[lineId];
    render();
    showToast('Undone ✓');
  } catch (e) {
    console.error('Failed to undo:', e);
    showToast('Failed to undo — check Work_Order_Lines table');
  }
}

async function onDyeActionChange(idx) {
  const action = document.getElementById(`action-${idx}`).value;
  const wrap = document.getElementById(`action-fields-${idx}`);

  if (action === 'put_away' || action === 'hold') {
    wrap.innerHTML = `<div class="action-fields">Checking existing stock...</div>`;
    const c = currentEntry.cleanupInfo[idx];
    let existing = [];
    if (c.dyeId) {
      try {
        const stockTable = await grist.docApi.fetchTable('Dye_Stock');
        const sIds = stockTable.id || [];
        sIds.forEach((id, i) => {
          const dyeRef = getRefId(columnAsArray(stockTable, stockCol('dye','Dye'))[i]);
          if (dyeRef !== c.dyeId) return;
          existing.push({
            id,
            qty: Number(columnAsArray(stockTable, stockCol('quantity','Quantity_mL'))[i]) || 0,
            bin: columnAsArray(stockTable, stockCol('bin','Bin_Location'))[i] || '(no bin)',
            mixedDate: columnAsArray(stockTable, stockCol('mixedDate','Mixed_Date'))[i],
          });
        });
      } catch (e) {
        console.error('Could not check existing stock:', e);
      }
    }

    // Bin suggestion was already computed when this recipe loaded (see cleanupInfo) —
    // reuse it here so the pre-filled field matches what's shown in the row above.
    const suggestedBin = c.suggestedBin;

    const binField = action === 'put_away'
      ? `<input type="text" id="bin-${idx}" placeholder="Bin location" value="${suggestedBin}">`
      : '';
    const binHint = action === 'put_away'
      ? `<div style="font-size:10px; color:#8B7D72; margin-top:3px;">Suggested bin ${suggestedBin} — keeps this dye's containers together for next time.</div>`
      : '';

    if (existing.length) {
      const existingOptions = existing.map(s => {
        const dateStr = s.mixedDate ? new Date(Number(s.mixedDate) * 1000).toLocaleDateString() : 'unknown date';
        return `<option value="${s.id}">${s.qty}mL in ${s.bin} (mixed ${dateStr})</option>`;
      }).join('');
      wrap.innerHTML = `
        <div style="font-size:10px; color:#8B7D72; margin-top:3px;">This dye already has stock on record — is this the same batch, or freshly mixed?</div>
        <select id="which-${idx}" style="width:100%; margin-top:3px;">
          <option value="new">This is freshly mixed — log as new</option>
          ${existingOptions}
        </select>
        ${binHint}
        <div class="action-fields" style="margin-top:3px;">
          <input type="number" id="qty-${idx}" placeholder="mL left" min="0">
          ${binField}
          <button class="action-confirm-btn" onclick="${action === 'put_away' ? 'putAwayDye' : 'holdDye'}(${idx})">✓</button>
        </div>
      `;
    } else {
      wrap.innerHTML = `${binHint}<div class="action-fields">
        <input type="number" id="qty-${idx}" placeholder="mL left" min="0">
        ${binField}
        <button class="action-confirm-btn" onclick="${action === 'put_away' ? 'putAwayDye' : 'holdDye'}(${idx})">✓</button>
      </div>`;
    }
  } else if (action === 'stage') {
    const c = currentEntry.cleanupInfo[idx];
    const slot = c.staging ? c.staging.slot : 'the prep table';
    wrap.innerHTML = `<div class="action-fields">
      <button class="action-confirm-btn" onclick="stageDye(${idx})" style="flex:1;">Confirm — left out at ${slot}</button>
    </div>`;
  } else if (action === 'dump') {
    wrap.innerHTML = `<div class="action-fields">
      <button class="action-confirm-btn" onclick="dumpDye(${idx})" style="flex:1;">Confirm dumped</button>
    </div>`;
  } else {
    wrap.innerHTML = '';
  }
}

// Staging writes nothing to Dye_Stock on purpose — the dye never left the bench,
// so there's no stock location to record. It just closes out the row for the day.
async function stageDye(idx) {
  const c = currentEntry.cleanupInfo[idx];
  const slot = c.staging ? c.staging.slot : 'prep table';
  const next = c.staging ? ` for ${c.staging.recipeName}` : '';
  completedActions[idx] = {
    label: `Staged at ${slot}${next} — not put away`,
    undo: async () => {},
  };
  render();
}

async function putAwayDye(idx) {
  const c = currentEntry.cleanupInfo[idx];
  if (!c.dyeId) { showToast(`${c.dyeName} isn't linked to a Dyes row — can't log stock`); return; }
  const qty = Number(document.getElementById(`qty-${idx}`).value) || 0;
  const bin = document.getElementById(`bin-${idx}`).value.trim();
  if (qty <= 0) { showToast('Enter how many mL are left'); return; }
  if (!bin) { showToast('Enter a bin location'); return; }

  const whichSelect = document.getElementById(`which-${idx}`);
  const which = whichSelect ? whichSelect.value : 'new';

  try {
    if (which === 'new') {
      const result = await grist.docApi.applyUserActions([
        ['AddRecord', 'Dye_Stock', null, { [stockCol('dye','Dye')]: c.dyeId, [stockCol('quantity','Quantity_mL')]: qty, [stockCol('bin','Bin_Location')]: bin, [stockCol('mixedDate','Mixed_Date')]: Math.floor(Date.now() / 1000) }]
      ]);
      const newRowId = result.retValues[0];
      completedActions[idx] = {
        label: `Put away — ${qty}mL logged as new stock in bin ${bin}`,
        undo: async () => {
          await grist.docApi.applyUserActions([['RemoveRecord', 'Dye_Stock', newRowId]]);
        },
      };
    } else {
      const stockTable = await grist.docApi.fetchTable('Dye_Stock');
      const rowIdx = (stockTable.id || []).indexOf(Number(which));
      const originalQty = rowIdx >= 0 ? columnAsArray(stockTable, stockCol('quantity','Quantity_mL'))[rowIdx] : null;
      const originalBin = rowIdx >= 0 ? columnAsArray(stockTable, stockCol('bin','Bin_Location'))[rowIdx] : null;

      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Dye_Stock', Number(which), { [stockCol('quantity','Quantity_mL')]: qty, [stockCol('bin','Bin_Location')]: bin }]
      ]);
      completedActions[idx] = {
        label: `Put away — existing stock updated to ${qty}mL in bin ${bin}`,
        undo: async () => {
          await grist.docApi.applyUserActions([['UpdateRecord', 'Dye_Stock', Number(which), { [stockCol('quantity','Quantity_mL')]: originalQty, [stockCol('bin','Bin_Location')]: originalBin }]]);
        },
      };
    }
    render();
  } catch (e) {
    console.error('Failed to put away dye:', e);
    showToast('Failed — check the Dye_Stock table');
  }
}

async function holdDye(idx) {
  const c = currentEntry.cleanupInfo[idx];
  if (!c.dyeId) { showToast(`${c.dyeName} isn't linked to a Dyes row — can't log stock`); return; }
  const qty = Number(document.getElementById(`qty-${idx}`).value) || 0;
  if (qty <= 0) { showToast('Enter how many mL are left'); return; }

  const whichSelect = document.getElementById(`which-${idx}`);
  const which = whichSelect ? whichSelect.value : 'new';

  try {
    if (which === 'new') {
      const result = await grist.docApi.applyUserActions([
        ['AddRecord', 'Dye_Stock', null, { [stockCol('dye','Dye')]: c.dyeId, [stockCol('quantity','Quantity_mL')]: qty, [stockCol('mixedDate','Mixed_Date')]: Math.floor(Date.now() / 1000) }]
      ]);
      const newRowId = result.retValues[0];
      completedActions[idx] = {
        label: `Held — ${qty}mL logged as new stock, no bin yet`,
        undo: async () => {
          await grist.docApi.applyUserActions([['RemoveRecord', 'Dye_Stock', newRowId]]);
        },
      };
    } else {
      const stockTable = await grist.docApi.fetchTable('Dye_Stock');
      const rowIdx = (stockTable.id || []).indexOf(Number(which));
      const originalQty = rowIdx >= 0 ? columnAsArray(stockTable, stockCol('quantity','Quantity_mL'))[rowIdx] : null;

      await grist.docApi.applyUserActions([
        ['UpdateRecord', 'Dye_Stock', Number(which), { [stockCol('quantity','Quantity_mL')]: qty }]
      ]);
      completedActions[idx] = {
        label: `Held — existing stock updated to ${qty}mL`,
        undo: async () => {
          await grist.docApi.applyUserActions([['UpdateRecord', 'Dye_Stock', Number(which), { [stockCol('quantity','Quantity_mL')]: originalQty }]]);
        },
      };
    }
    render();
  } catch (e) {
    console.error('Failed to hold dye:', e);
    showToast('Failed — check the Dye_Stock table');
  }
}

async function dumpDye(idx) {
  const c = currentEntry.cleanupInfo[idx];
  if (!c.dyeId) {
    completedActions[idx] = { label: 'Dumped', undo: async () => {} };
    render();
    return;
  }

  let existing = [];
  try {
    const stockTable = await grist.docApi.fetchTable('Dye_Stock');
    const sIds = stockTable.id || [];
    sIds.forEach((id, i) => {
      const dyeRef = getRefId(columnAsArray(stockTable, stockCol('dye','Dye'))[i]);
      if (dyeRef !== c.dyeId) return;
      existing.push({
        id,
        dye: c.dyeId,
        qty: columnAsArray(stockTable, stockCol('quantity','Quantity_mL'))[i],
        bin: columnAsArray(stockTable, stockCol('bin','Bin_Location'))[i],
        mixedDate: columnAsArray(stockTable, stockCol('mixedDate','Mixed_Date'))[i],
      });
    });
  } catch (e) {
    console.error('Could not check existing stock before dumping:', e);
  }

  if (!existing.length) {
    completedActions[idx] = { label: 'Dumped (no premade stock was on record)', undo: async () => {} };
    render();
    return;
  }

  const totalQty = existing.reduce((s, e) => s + (Number(e.qty) || 0), 0);
  if (!confirm(`This will remove ${totalQty}mL of recorded premade stock for ${c.dyeName}. Continue?`)) return;

  try {
    await grist.docApi.applyUserActions(existing.map(e => ['RemoveRecord', 'Dye_Stock', e.id]));
    completedActions[idx] = {
      label: `Dumped — removed ${totalQty}mL from stock`,
      undo: async () => {
        await grist.docApi.applyUserActions(existing.map(e => ['AddRecord', 'Dye_Stock', null, { [stockCol('dye','Dye')]: e.dye, [stockCol('quantity','Quantity_mL')]: e.qty, [stockCol('bin','Bin_Location')]: e.bin, [stockCol('mixedDate','Mixed_Date')]: e.mixedDate }]));
      },
    };
    render();
  } catch (e) {
    console.error('Failed to dump dye stock:', e);
    showToast('Failed — check the Dye_Stock table');
  }
}

async function undoAction(idx) {
  const done = completedActions[idx];
  if (!done) return;
  try {
    await done.undo();
    delete completedActions[idx];
    render();
    showToast('Undone — pick an option again if needed');
  } catch (e) {
    console.error('Undo failed:', e);
    showToast('Undo failed — check the Dye_Stock table');
  }
}

async function createColorDraft() {
  try {
    await grist.docApi.applyUserActions([
      ['AddRecord', 'Recipes', null, {
        Recipe_Name: 'Untitled Draft (from leftovers)',
        Status: 'Researching',
        Notes: `Created from leftover dyes while working on ${currentEntry.recipeName}`,
      }]
    ]);
    showToast('New color draft created — find it in your Recipes drafts ✓');
  } catch (e) {
    console.error('Failed to create draft:', e);
    showToast('Failed — check the Recipes table');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

grist.ready({
  requiredAccess: 'full'
});

grist.onRecord((record) => {
  lastLoggedDelta = {};
  loadForRecipe(record);
});
</script>
</body>
</html>
