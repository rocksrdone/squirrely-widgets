<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Shipment Invoice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --ink: #1A1614;
  --paper: #F7F3EE;
  --warm: #E8DFD4;
  --rule: #D4C9BC;
  --accent: #8B3A2A;
  --teal: #3A8B7A;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  padding: 20px;
}
h1 { font-family: 'Libre Baskerville', serif; font-size: 20px; margin: 0 0 4px; }
.sub { font-size: 11px; color: #8B7D72; margin-bottom: 18px; }

.no-print-box {
  background: white; border: 1.5px solid var(--rule); border-radius: 8px;
  padding: 14px; margin-bottom: 18px;
}
.lookup-row { display: flex; gap: 8px; align-items: center; }
.lookup-row input {
  flex: 1; padding: 8px 10px; border: 1px solid var(--rule); border-radius: 6px;
  font-size: 13px; font-family: 'DM Mono', monospace;
}
.btn {
  font-size: 12px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--accent); background: var(--accent); color: white; font-weight: 600;
}
.btn.secondary { background: white; color: var(--ink); border-color: var(--rule); }
.btn:disabled { opacity: .4; cursor: default; }
.status-msg { font-size: 11px; color: #8B7D72; margin-top: 8px; }
.status-msg.error { color: var(--accent); }
.shipment-picker { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.shipment-picker-label { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: #8B7D72; width: 100%; margin-bottom: 2px; }
.shipment-btn {
  font-size: 11px; padding: 6px 10px; border-radius: 5px; border: 1px solid var(--teal);
  background: white; color: var(--teal); cursor: pointer; font-weight: 600;
}
.shipment-btn:hover { background: var(--teal); color: white; }

.invoice-wrap { display: none; }
.invoice-wrap.ready { display: block; }

.invoice-sheet {
  background: white; border: 1.5px solid var(--rule); border-radius: 8px;
  padding: 28px; max-width: 800px;
}

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 18px; }
.field-block label {
  display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: #8B7D72; margin-bottom: 6px; margin-top: 8px;
}
.field-block label:first-child { margin-top: 0; }
.field-block input, .field-block textarea {
  width: 100%; padding: 5px 0; border: none; border-bottom: 1px solid var(--rule);
  font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: transparent;
}
.field-block input:focus, .field-block textarea:focus { border-bottom-color: var(--accent); }
.field-block h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--teal); margin: 0 0 8px; }

.meta-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 18px; }
.meta-item { flex: 1; min-width: 140px; }
.meta-item label {
  display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: #8B7D72; margin-bottom: 6px;
}
.meta-item input {
  width: 100%; padding: 5px 0; border: none; border-bottom: 1px solid var(--rule);
  font-size: 13px; outline: none; background: transparent; font-family: 'DM Mono', monospace;
}
.meta-item.internal-only { background: var(--warm); padding: 6px 8px; border-radius: 5px; }
.meta-item.internal-only label::after { content: ' (internal — not printed)'; font-style: italic; }

table.items { width: 100%; border-collapse: collapse; margin: 10px 0 14px; }
table.items th {
  text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: #8B7D72; border-bottom: 1.5px solid var(--rule); padding: 6px 6px;
}
table.items td { padding: 6px 6px; border-bottom: 1px solid var(--rule); font-size: 12px; vertical-align: middle; }
table.items input[type="number"] {
  width: 60px; padding: 4px 6px; border: 1px solid var(--rule); border-radius: 4px; font-size: 12px;
}
table.items input[type="text"] {
  width: 100%; padding: 4px 6px; border: 1px solid var(--rule); border-radius: 4px; font-size: 12px;
}
.line-total { font-family: 'DM Mono', monospace; text-align: right; }
.col-check { width: 26px; text-align: center; }
.col-qty-ordered { width: 60px; color: #8B7D72; font-family: 'DM Mono', monospace; }

.add-line-btn {
  font-size: 11px; padding: 6px 10px; border-radius: 5px; border: 1px dashed var(--rule);
  background: white; color: #6B5E52; cursor: pointer; margin-bottom: 14px;
}

.totals-block { display: flex; justify-content: flex-end; margin-top: 10px; }
.totals-table { min-width: 240px; }
.totals-table .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.totals-table .row.grand { border-top: 1.5px solid var(--ink); margin-top: 6px; padding-top: 8px; font-weight: 700; font-size: 15px; }
.totals-table input {
  width: 90px; text-align: right; border: 1px solid var(--rule); border-radius: 4px;
  padding: 3px 6px; font-family: 'DM Mono', monospace; font-size: 12px;
}

.note-block { margin-top: 20px; }
.note-block textarea {
  width: 100%; min-height: 50px; padding: 8px; border: 1px solid var(--rule); border-radius: 5px;
  font-size: 12px; font-family: 'Inter', sans-serif; resize: vertical;
}

.print-actions { margin-top: 18px; display: flex; gap: 8px; }

@media print {
  body { padding: 0; background: white; }
  .no-print-box, .print-actions, .add-line-btn, .col-check, .col-qty-ordered,
  .meta-item.internal-only, .sub, h1 { display: none !important; }
  .invoice-wrap { display: block !important; }
  .invoice-sheet { border: none; padding: 0; max-width: none; }
  table.items input, .field-block input, .field-block textarea, .totals-table input, .note-block textarea {
    border: none !important; background: transparent !important; padding: 0 !important;
  }
  tr.zero-qty { display: none !important; }
}
</style>
</head>
<body>

<h1>Split Shipment Invoice</h1>
<div class="sub">Pull a Shopify order, choose what's physically going in this shipment, print a standalone invoice for just that.</div>

<div class="no-print-box">
  <div class="lookup-row">
    <input id="orderNumberInput" placeholder="Order number (e.g. 1071 or #1071)">
    <button class="btn" onclick="lookupOrder()" id="lookupBtn">Look Up Order</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>
  <div id="shipmentPicker"></div>
</div>

<div class="invoice-wrap" id="invoiceWrap">
  <div class="invoice-sheet">

    <div class="field-grid">
      <div class="field-block">
        <h3>Ship From</h3>
        <label>Company</label>
        <input id="fromCompany" value="Squirrely Stash">
        <label>Address Line 1</label>
        <input id="fromAddr1" placeholder="Street address">
        <label>Address Line 2</label>
        <input id="fromAddr2" placeholder="Suite / unit (optional)">
        <label>City, State, ZIP</label>
        <input id="fromCityStateZip" placeholder="City, State ZIP">
        <label>Country</label>
        <input id="fromCountry" value="United States">
      </div>
      <div class="field-block">
        <h3>Ship To</h3>
        <label>Name / Company</label>
        <input id="toName">
        <label>Address Line 1</label>
        <input id="toAddr1">
        <label>Address Line 2</label>
        <input id="toAddr2">
        <label>City, State/Province, ZIP</label>
        <input id="toCityStateZip">
        <label>Country</label>
        <input id="toCountry">
      </div>
    </div>

    <div class="meta-row">
      <div class="meta-item">
        <label>Invoice Number</label>
        <input id="invoiceNumber">
      </div>
      <div class="meta-item">
        <label>Invoice Date</label>
        <input id="invoiceDate" type="date">
      </div>
      <div class="meta-item">
        <label>Reason for Export</label>
        <input id="reasonForExport" value="Sold Goods">
      </div>
      <div class="meta-item">
        <label>Country of Origin</label>
        <input id="countryOfOrigin" value="United States">
      </div>
      <div class="meta-item">
        <label>Currency</label>
        <input id="currency" value="USD">
      </div>
      <div class="meta-item internal-only">
        <label>Source Order #</label>
        <input id="sourceOrderNumber" readonly>
      </div>
      <div class="meta-item internal-only">
        <label>Shipment Label</label>
        <input id="shipmentLabel" placeholder="e.g. Shipment 1 of 2">
      </div>
    </div>

    <table class="items">
      <thead>
        <tr>
          <th class="col-check"></th>
          <th>Description</th>
          <th class="col-qty-ordered">Ordered</th>
          <th style="width:70px">This Shipment</th>
          <th style="width:90px">Unit Price</th>
          <th style="width:90px; text-align:right">Line Total</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>

    <button class="add-line-btn" onclick="addCustomLine()">+ Add custom line</button>

    <div class="totals-block">
      <div class="totals-table">
        <div class="row"><span>Goods Subtotal</span><span class="line-total" id="goodsSubtotal">0.00</span></div>
        <div class="row"><span>Shipping / Freight Value</span><input type="number" id="shippingValue" value="0.00" step="0.01" oninput="recalcTotals()"></div>
        <div class="row grand"><span>Total Declared Value</span><span class="line-total" id="grandTotal">0.00</span></div>
      </div>
    </div>

    <div class="note-block">
      <label style="font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:#8B7D72; display:block; margin-bottom:6px;">Invoice Note</label>
      <textarea id="invoiceNote">Goods sold. Hand-dyed thread for musical reed making.</textarea>
    </div>

  </div>

  <div class="print-actions">
    <button class="btn" onclick="window.print()">🖨 Print / Save as PDF</button>
    <button class="btn secondary" onclick="resetAll()">Start Over</button>
  </div>
</div>

<script>
const LOOKUP_WEBHOOK_URL = 'https://squirrelystash.app.n8n.cloud/webhook/split-invoice-lookup';

let shopifyLines = [];   // [{id, sku, name, orderedQty, unitPrice}]
let customLines = [];    // [{key, description, qty, unitPrice}]
let customLineSeq = 0;
let detectedShipments = []; // [{source, status, label, line_items}]

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

async function lookupOrder() {
  const raw = document.getElementById('orderNumberInput').value.trim();
  const statusEl = document.getElementById('statusMsg');
  if (!raw) { statusEl.textContent = 'Enter an order number first.'; statusEl.className = 'status-msg error'; return; }

  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.textContent = 'Looking up...';
  statusEl.textContent = '';
  statusEl.className = 'status-msg';

  try {
    const res = await fetch(`${LOOKUP_WEBHOOK_URL}?order_number=${encodeURIComponent(raw)}`);
    const data = await res.json();

    if (!data.found) {
      statusEl.textContent = `No order found matching "${raw}" (checked regular and draft orders).`;
      statusEl.className = 'status-msg error';
      document.getElementById('invoiceWrap').classList.remove('ready');
      return;
    }

    shopifyLines = (data.line_items || []).map(li => ({
      id: li.id,
      sku: li.sku,
      name: li.name,
      orderedQty: li.quantity,
      unitPrice: parseFloat(li.price) || 0,
    }));
    customLines = [];
    customLineSeq = 0;
    detectedShipments = data.shipments || [];

    document.getElementById('sourceOrderNumber').value = data.order_number || '';
    document.getElementById('currency').value = data.currency || 'USD';
    document.getElementById('invoiceNumber').value = `${(data.order_number || raw).replace(/^#/, '')}-SHIP1`;
    document.getElementById('invoiceDate').value = todayISO();

    const st = data.ship_to || {};
    document.getElementById('toName').value = [st.company, st.name].filter(Boolean).join(' — ') || st.name || '';
    document.getElementById('toAddr1').value = st.address1 || '';
    document.getElementById('toAddr2').value = st.address2 || '';
    document.getElementById('toCityStateZip').value = [st.city, st.province, st.zip].filter(Boolean).join(', ');
    document.getElementById('toCountry').value = st.country || '';

    document.getElementById('invoiceWrap').classList.add('ready');
    statusEl.textContent = `Loaded ${data.order_type} order ${data.order_number} — ${shopifyLines.length} line item(s).`;
    renderShipmentPicker();
    renderItems();
    recalcTotals();
  } catch (e) {
    console.error(e);
    statusEl.textContent = 'Lookup failed — is the n8n webhook live?';
    statusEl.className = 'status-msg error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Look Up Order';
  }
}

function renderShipmentPicker() {
  const box = document.getElementById('shipmentPicker');
  if (!detectedShipments.length) {
    box.innerHTML = `<div style="font-size:11px; color:#8B7D72; margin-top:6px;">No existing Shopify split/fulfillment detected for this order — check off items manually below.</div>`;
    return;
  }
  box.innerHTML = `
    <div class="shipment-picker">
      <div class="shipment-picker-label">Detected in Shopify — click to auto-fill this shipment's items:</div>
      ${detectedShipments.map((s, i) => `<button type="button" class="shipment-btn" onclick="applyShipmentPreset(${i})">${s.label} (${s.line_items.length} item${s.line_items.length === 1 ? '' : 's'})</button>`).join('')}
      <button type="button" class="shipment-btn" style="border-color:var(--rule); color:#6B5E52;" onclick="clearAllQuantities()">Clear all</button>
    </div>
  `;
}

function applyShipmentPreset(idx) {
  const shipment = detectedShipments[idx];
  if (!shipment) return;
  const qtyById = {};
  shipment.line_items.forEach(li => { qtyById[li.id] = (qtyById[li.id] || 0) + (li.quantity || 0); });

  shopifyLines.forEach((li, i) => {
    const qty = qtyById[li.id] || 0;
    const row = document.querySelector(`tr[data-kind="shopify"][data-idx="${i}"]`);
    if (!row) return;
    const checkbox = row.querySelector('input[type="checkbox"]');
    const qtyInput = row.querySelector('input[type="number"]');
    checkbox.checked = qty > 0;
    qtyInput.value = qty;
    updateShopifyQty(i, qty);
  });

  document.getElementById('shipmentLabel').value = shipment.label;
}

function clearAllQuantities() {
  shopifyLines.forEach((li, i) => {
    const row = document.querySelector(`tr[data-kind="shopify"][data-idx="${i}"]`);
    if (!row) return;
    row.querySelector('input[type="checkbox"]').checked = false;
    row.querySelector('input[type="number"]').value = 0;
    updateShopifyQty(i, 0);
  });
}

function renderItems() {
  const body = document.getElementById('itemsBody');
  const shopifyRows = shopifyLines.map((li, i) => `
    <tr class="zero-qty" data-kind="shopify" data-idx="${i}">
      <td class="col-check"><input type="checkbox" onchange="toggleShopifyLine(${i}, this.checked)"></td>
      <td>${li.name}${li.sku ? ` <span style="color:#8B7D72">(${li.sku})</span>` : ''}</td>
      <td class="col-qty-ordered">${li.orderedQty}</td>
      <td><input type="number" min="0" max="${li.orderedQty}" value="0" oninput="updateShopifyQty(${i}, this.value)"></td>
      <td class="line-total">${li.unitPrice.toFixed(2)}</td>
      <td class="line-total" id="shopify-total-${i}">0.00</td>
    </tr>
  `).join('');

  const customRows = customLines.map(cl => `
    <tr class="${cl.qty > 0 ? '' : 'zero-qty'}" data-kind="custom" data-key="${cl.key}">
      <td class="col-check">—</td>
      <td><input type="text" placeholder="Description" value="${cl.description}" oninput="updateCustomField(${cl.key}, 'description', this.value)"></td>
      <td class="col-qty-ordered">—</td>
      <td><input type="number" min="0" value="${cl.qty}" oninput="updateCustomField(${cl.key}, 'qty', this.value)"></td>
      <td><input type="number" min="0" step="0.01" value="${cl.unitPrice.toFixed(2)}" oninput="updateCustomField(${cl.key}, 'unitPrice', this.value)"></td>
      <td class="line-total" id="custom-total-${cl.key}">${(cl.qty * cl.unitPrice).toFixed(2)}</td>
    </tr>
  `).join('');

  body.innerHTML = shopifyRows + customRows;
}

function toggleShopifyLine(i, checked) {
  const row = document.querySelector(`tr[data-kind="shopify"][data-idx="${i}"]`);
  const qtyInput = row.querySelector('input[type="number"]');
  if (checked) {
    qtyInput.value = shopifyLines[i].orderedQty;
  } else {
    qtyInput.value = 0;
  }
  updateShopifyQty(i, qtyInput.value);
}

function updateShopifyQty(i, value) {
  const qty = Math.max(0, parseFloat(value) || 0);
  const li = shopifyLines[i];
  const total = qty * li.unitPrice;
  document.getElementById(`shopify-total-${i}`).textContent = total.toFixed(2);
  const row = document.querySelector(`tr[data-kind="shopify"][data-idx="${i}"]`);
  row.classList.toggle('zero-qty', qty <= 0);
  recalcTotals();
}

function addCustomLine() {
  const key = ++customLineSeq;
  customLines.push({ key, description: '', qty: 1, unitPrice: 0 });
  renderItems();
  recalcTotals();
}

function updateCustomField(key, field, value) {
  const cl = customLines.find(c => c.key === key);
  if (!cl) return;
  if (field === 'qty') cl.qty = Math.max(0, parseFloat(value) || 0);
  else if (field === 'unitPrice') cl.unitPrice = Math.max(0, parseFloat(value) || 0);
  else cl.description = value;

  const total = cl.qty * cl.unitPrice;
  const totalEl = document.getElementById(`custom-total-${key}`);
  if (totalEl) totalEl.textContent = total.toFixed(2);
  const row = document.querySelector(`tr[data-kind="custom"][data-key="${key}"]`);
  if (row) row.classList.toggle('zero-qty', cl.qty <= 0);
  recalcTotals();
}

function recalcTotals() {
  const shopifySum = shopifyLines.reduce((sum, li, i) => {
    const row = document.querySelector(`tr[data-kind="shopify"][data-idx="${i}"]`);
    const qty = row ? parseFloat(row.querySelector('input[type="number"]').value) || 0 : 0;
    return sum + qty * li.unitPrice;
  }, 0);
  const customSum = customLines.reduce((sum, cl) => sum + cl.qty * cl.unitPrice, 0);
  const goodsSubtotal = shopifySum + customSum;
  const shipping = parseFloat(document.getElementById('shippingValue').value) || 0;

  document.getElementById('goodsSubtotal').textContent = goodsSubtotal.toFixed(2);
  document.getElementById('grandTotal').textContent = (goodsSubtotal + shipping).toFixed(2);
}

function resetAll() {
  shopifyLines = [];
  customLines = [];
  customLineSeq = 0;
  detectedShipments = [];
  document.getElementById('shipmentPicker').innerHTML = '';
  document.getElementById('invoiceWrap').classList.remove('ready');
  document.getElementById('orderNumberInput').value = '';
  document.getElementById('statusMsg').textContent = '';
}
</script>
</body>
</html>
