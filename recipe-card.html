<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Card</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1A1614;
    --paper: #F7F3EE;
    --warm: #E8DFD4;
    --rule: #D4C9BC;
    --accent: #8B3A2A;
    --accent-light: #F2E8E5;
    --teal: #3A8B7A;
    --teal-light: #E5F2EF;
    --gold: #B07D2A;
    --gold-light: #F5EDD8;
    --done-bg: #EAF3DE;
    --done-border: #639922;
    --done-text: #27500A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #8B7D72;
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
  .empty-title { font-family: 'Libre Baskerville', serif; font-size: 16px; color: #6B5E52; margin-bottom: 6px; }
  .empty-sub { font-size: 12px; }

  /* ── MAIN LAYOUT ── */
  .card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 100vh;
  }

  .panel {
    padding: 16px;
    border-right: 1px solid var(--rule);
    overflow-y: auto;
  }
  .panel:last-child { border-right: none; }

  /* ── RECIPE HEADER ── */
  .recipe-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .recipe-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .recipe-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .product-preview-thumb {
    flex: 0 0 auto;
    width: 56px; height: 56px;
    border-radius: 8px; overflow: hidden;
    border: 1.5px solid var(--rule);
    background: var(--warm);
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .product-preview-thumb:hover { transform: scale(1.05); border-color: var(--accent); }
  .product-preview-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  body.big-mode .product-preview-thumb { width: 90px; height: 90px; }

  .preview-wrap { position: relative; flex: 0 0 auto; }
  .product-preview-thumb.empty {
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #8B7D72; border-style: dashed;
  }
  .preview-edit-btn {
    position: absolute; bottom: -8px; right: -8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: white; border: 1.5px solid var(--rule);
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-edit-btn:hover { border-color: var(--accent); }
  .preview-refresh-btn {
    position: absolute; top: -8px; right: -8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: white; border: 1.5px solid var(--rule);
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-refresh-btn:hover { border-color: var(--accent); }
  .preview-picker-dropdown {
    position: absolute; top: calc(100% + 10px); right: 0; z-index: 50;
    width: 220px; max-height: 260px; overflow-y: auto;
    background: white; border: 1px solid var(--rule); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 6px;
  }
  .preview-picker-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px; border-radius: 6px; cursor: pointer;
  }
  .preview-picker-row:hover { background: var(--warm); }
  .preview-picker-row.selected { background: var(--done-bg); }
  .preview-picker-row img { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--warm); flex-shrink: 0; }
  .preview-picker-info { min-width: 0; }
  .ppr-name { font-size: 11px; font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ppr-current { font-size: 9px; color: var(--done-text); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .preview-picker-empty { font-size: 11px; color: #8B7D72; font-style: italic; padding: 10px; text-align: center; }
  .meta-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .tag-method { background: var(--accent-light); color: var(--accent); border: 1px solid #D4A49A; }
  .tag-fiber { background: var(--teal-light); color: var(--teal); border: 1px solid #9ACFC7; }
  .tag-scope { background: var(--gold-light); color: var(--gold); border: 1px solid #D4B07A; }

  /* ── YARDAGE ── */
  .yardage-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding: 8px 10px;
    background: var(--warm);
    border-radius: 6px;
    border: 1px solid var(--rule);
  }
  .yardage-label { font-size: 10px; font-weight: 600; color: #6B5E52; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
  .preset-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--rule);
    background: white;
    font-size: 11px;
    cursor: pointer;
    color: var(--ink);
    font-family: 'DM Mono', monospace;
  }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .custom-input {
    width: 60px;
    padding: 4px 6px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: white;
    color: var(--ink);
    outline: none;
  }

  /* ── SECTION LABEL ── */
  .slabel {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #8B7D72;
    margin-bottom: 8px;
    margin-top: 14px;
  }
  .slabel:first-child { margin-top: 0; }

  /* ── DYE TABLE ── */
  .dye-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
  .dye-table th {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #8B7D72;
    text-align: left;
    padding: 0 8px 6px 0;
    border-bottom: 1px solid var(--rule);
  }
  .dye-table td {
    padding: 7px 8px 7px 0;
    border-bottom: 1px solid var(--warm);
    vertical-align: middle;
  }
  .dye-table tr:last-child td { border-bottom: none; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
  .dye-name-cell { display: flex; align-items: center; }
  .brand { font-family: 'DM Mono', monospace; font-size: 9px; background: var(--warm); color: #6B5E52; border-radius: 2px; padding: 1px 4px; margin-left: 5px; border: 1px solid var(--rule); }
  .amt { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
  .dil { font-size: 10px; color: #8B7D72; font-style: italic; }

  /* ── COLOR LAYOUT ── */
  .layout-ring-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .layout-wrap { background: var(--warm); border-radius: 5px; padding: 10px 12px; border: 1px solid var(--rule); margin-bottom: 14px; }
  .skein-row { margin-bottom: 6px; }
  .skein-row:last-child { margin-bottom: 0; }
  .skein-lbl { font-size: 9px; font-weight: 500; color: #8B7D72; margin-bottom: 4px; }
  .skein-bars { display: flex; gap: 2px; height: 10px; border-radius: 3px; overflow: hidden; }
  .skein-bar { height: 100%; border-radius: 2px; }
  .layout-note { font-size: 10px; color: #6B5E52; font-style: italic; margin-top: 6px; }

  /* ── PHOTOS ── */
  .photo-viewer {
    position: relative;
    width: 100%;
    height: 220px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--rule);
    background: var(--warm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s ease;
  }
  .photo-viewer:hover { border-color: var(--accent); }
  .photo-viewer img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .viewer-caption {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 6px 10px;
    background: linear-gradient(to top, rgba(26,22,20,.78), rgba(26,22,20,0));
  }
  .viewer-label {
    display: block;
    font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    color: white;
  }
  .viewer-caption .photo-note {
    color: rgba(255,255,255,.85);
  }
  .photo-note {
    display: block;
    font-size: 9px; color: #8B7D72; font-style: italic;
    margin-top: 1px;
  }
  .viewer-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }
  .viewer-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--rule);
    cursor: pointer;
    transition: all .15s ease;
  }
  .viewer-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }
  .viewer-undo-btn {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; padding: 3px 7px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,.4);
    background: rgba(26,22,20,.55);
    color: white;
    cursor: pointer;
  }
  .viewer-undo-btn:hover { background: rgba(26,22,20,.8); }

  .lightbox-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,12,10,.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox-overlay.open { display: flex; }
  .lightbox-overlay img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
  }
  .lightbox-close {
    position: absolute;
    top: 18px; right: 22px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,.12);
    color: white;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .lightbox-caption {
    position: absolute;
    bottom: 24px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,.85);
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* ── BIG VIEW MODE ── */
  .big-toggle-btn {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 500;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: white;
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }
  body.big-mode .big-toggle-btn { background: var(--accent); color: white; }

  body.big-mode .card { grid-template-columns: 1.15fr 0.85fr; }
  body.big-mode .panel { border-right: 1px solid var(--rule); padding: 20px 24px; max-width: none; margin: 0; overflow-y: auto; height: 100vh; }
  body.big-mode #rightPanel { border-top: none; margin-top: 0; padding-top: 20px; }

  body.big-mode .recipe-name { font-size: 32px; }
  body.big-mode .meta-tag { font-size: 13px; padding: 4px 12px; }

  body.big-mode .photo-viewer { height: 46vh; max-height: 560px; }
  body.big-mode .viewer-label { font-size: 15px; }
  body.big-mode .viewer-caption .photo-note { font-size: 14px; }
  body.big-mode .photo-note { font-size: 14px; }
  body.big-mode .viewer-dots { margin-top: 12px; }
  body.big-mode .viewer-dot { width: 12px; height: 12px; }
  body.big-mode .viewer-dot.active { width: 30px; }
  body.big-mode .step-badge { width: 22px; height: 22px; font-size: 12px; }
  body.big-mode .layout-wrap { display: none; }

  body.big-mode .slabel { font-size: 12px; }
  body.big-mode .dye-table { font-size: 18px; }
  body.big-mode .dye-table th { font-size: 12px; }
  body.big-mode .swatch { width: 16px; height: 16px; margin-right: 10px; }
  body.big-mode .amt { font-size: 18px; }
  body.big-mode .dil { font-size: 14px; }
  body.big-mode .brand { font-size: 12px; padding: 2px 7px; }

  body.big-mode .notes-box { font-size: 16px; padding: 16px 18px; }
  body.big-mode .notes-title { font-size: 12px; }

  body.big-mode .step-item { padding: 16px; }
  body.big-mode .step-num { width: 30px; height: 30px; font-size: 15px; }
  body.big-mode .step-dye { font-size: 13px; }
  body.big-mode .step-text { font-size: 16px; }
  body.big-mode .step-pos { font-size: 13px; }

  /* ── NOTES ── */
  .notes-box {
    background: var(--gold-light);
    border: 1px solid #D4B07A;
    border-radius: 5px;
    padding: 10px 12px;
    font-size: 12px;
    color: #5A3E1B;
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .notes-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #8B5A2B; margin-bottom: 4px; }

  /* ── STEPS ── */
  .steps-list { display: flex; flex-direction: column; gap: 6px; }
  .step-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px;
    border-radius: 5px;
    border: 1.5px solid var(--warm);
    background: white;
    cursor: pointer;
    user-select: none;
  }
  .step-item:hover { border-color: var(--rule); }
  .step-item.done { background: var(--done-bg); border-color: var(--done-border); }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    background: var(--warm);
    color: #6B5E52;
    border: 1.5px solid var(--rule);
  }
  .step-item.done .step-num { background: var(--done-border); color: white; border-color: var(--done-border); }
  .step-dye { font-size: 10px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 2px; }
  .step-text { font-size: 12px; line-height: 1.5; }
  .step-item.done .step-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: #9AC96A; }
  .step-pos { font-size: 10px; color: #8B7D72; margin-top: 2px; font-style: italic; }

  /* ── PROGRESS ── */
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--rule);
  }
  .prog-label { font-size: 11px; color: #6B5E52; white-space: nowrap; }
  .prog-track { flex: 1; height: 4px; background: var(--warm); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--done-border); border-radius: 2px; transition: width .2s; }
  .reset-btn {
    font-size: 11px; padding: 3px 8px;
    border-radius: 4px; border: 1px solid var(--rule);
    background: transparent; cursor: pointer; color: #6B5E52;
    font-family: 'Inter', sans-serif;
  }

  .no-data { color: #8B7D72; font-size: 12px; padding: 10px 0; font-style: italic; }
</style>
</head>
<body>

<button class="big-toggle-btn" id="bigViewToggle" onclick="toggleBigView()">⤢ Big View</button>

<div class="empty" id="emptyState">
  <div class="empty-icon">🧵</div>
  <div class="empty-title">No recipe selected</div>
  <div class="empty-sub">Click a row in the Recipes table to load its production card</div>
</div>

<div class="card" id="cardView" style="display:none">
  <div class="panel" id="leftPanel"></div>
  <div class="panel" id="rightPanel"></div>
</div>

<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">✕</div>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
const DYE_COLORS = {
  red:'#C8294A',rhodamine:'#D83060',pink:'#E84080',fuschia:'#D83060',fuchsia:'#D83060',
  blue:'#2060C8',aqua:'#20A0C8',teal:'#20A890',turquoise:'#20B2A0',
  green:'#40A840',yellow:'#E8D020',orange:'#E87020',purple:'#8040C8',
  black:'#2A2A2A',brown:'#8B5A2B',gold:'#C8A020',coral:'#E05040',
  mint:'#40C890',lavender:'#A080C8',navy:'#203080',forest:'#2A6040',
  grey:'#888780',gray:'#888780',white:'#F0EDE8',silver:'#A0A0A8',
  scarlet:'#C82020',crimson:'#A01830',magenta:'#C030A0',violet:'#6030C0',
  cerulean:'#2080C0',cobalt:'#2048A8',emerald:'#208050',sage:'#80A870',
  ecru:'#C8B890',cream:'#F0EAD0',caramel:'#C08040',russet:'#904030'
};

function guessColor(name) {
  if (!name) return '#888780';
  const l = name.toLowerCase();
  for (const [k,v] of Object.entries(DYE_COLORS)) {
    if (l.includes(k)) return v;
  }
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xFFFFFF;
  return '#' + ((h & 0xBFBFBF) | 0x404040).toString(16).padStart(6,'0');
}

function togglePreviewPicker() {
  previewPickerOpen = !previewPickerOpen;
  renderLeft();
}

async function selectPreviewPhoto(photoId) {
  const previousId = currentPreviewId;
  const actions = [];
  if (previousId && previousId !== photoId) {
    actions.push(['UpdateRecord', 'Product_Photos', previousId, { Is_Preview: false }]);
  }
  if (previousId !== photoId) {
    actions.push(['UpdateRecord', 'Product_Photos', photoId, { Is_Preview: true }]);
  }

  if (actions.length) {
    try {
      await grist.docApi.applyUserActions(actions);
    } catch (e) {
      console.error('Failed to update preview photo:', e);
      alert('Could not update the preview photo — check the widget has full document access.');
      return;
    }
  }

  currentProductPhotos = currentProductPhotos.map(p => ({ ...p, isPreview: p.id === photoId }));
  const selected = currentProductPhotos.find(p => p.id === photoId);
  currentPreviewUrl = selected ? selected.url : null;
  currentPreviewId = photoId;
  previewPickerOpen = false;
  renderLeft();
}

function toggleBigView() {
  document.body.classList.toggle('big-mode');
  const btn = document.getElementById('bigViewToggle');
  btn.textContent = document.body.classList.contains('big-mode') ? '⤡ Normal View' : '⤢ Big View';
}

function openLightbox(url, caption) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightboxCaption').textContent = caption || '';
  document.getElementById('lightboxOverlay').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightboxOverlay').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

let currentYardage = 100;
let currentRecipe = null;
let currentComponents = [];
let currentPhotoIndex = 0;
let currentPreviewUrl = null;
let currentBaseSegments = [];
let currentOverlayMarks = [];
let currentPreviewId = null;
let currentProductPhotos = [];
let previewPickerOpen = false;

function getPhotoList(r) {
  const list = [];
  if (r.Photo_Process_1) list.push({ url: r.Photo_Process_1, label: 'Step 1', note: r.Photo_Process_1_Note });
  if (r.Photo_Process_2) list.push({ url: r.Photo_Process_2, label: 'Step 2', note: r.Photo_Process_2_Note });
  if (r.Photo_Finished) list.push({ url: r.Photo_Finished, label: 'Finished', note: r.Photo_Finished_Note });
  return list;
}

const PHOTO_SLOT_MAP = {
  'Step 1': { photoField: 'Photo_Process_1', noteField: 'Photo_Process_1_Note' },
  'Step 2': { photoField: 'Photo_Process_2', noteField: 'Photo_Process_2_Note' },
  'Finished': { photoField: 'Photo_Finished', noteField: 'Photo_Finished_Note' },
};

function renderPhotoViewer() {
  const wrap = document.getElementById('photoViewerWrap');
  if (!wrap || !currentRecipe) return;

  const photos = getPhotoList(currentRecipe);
  if (!photos.length) { wrap.innerHTML = ''; return; }
  if (currentPhotoIndex >= photos.length) currentPhotoIndex = 0;

  const p = photos[currentPhotoIndex];
  const dotsHTML = photos.length > 1
    ? `<div class="viewer-dots">${photos.map((_, i) =>
        `<span class="viewer-dot ${i === currentPhotoIndex ? 'active' : ''}" onclick="event.stopPropagation(); jumpToPhoto(${i})"></span>`
      ).join('')}</div>`
    : '';

  wrap.innerHTML = `
    <div class="photo-viewer" onclick="nextPhoto()" title="${photos.length > 1 ? 'Click for next photo' : ''}">
      <img src="${p.url}" alt="${p.label}" onerror="this.style.display='none'">
      <div class="viewer-caption">
        <span class="viewer-label">${p.label}${photos.length > 1 ? ` · ${currentPhotoIndex + 1}/${photos.length}` : ''}</span>
        ${p.note ? `<span class="photo-note">${p.note}</span>` : ''}
      </div>
      <button class="viewer-undo-btn" onclick="event.stopPropagation(); sendPhotoToReview('${p.label}')" title="Send this photo back to the inbox for re-review">↩ Redo</button>
    </div>
    ${dotsHTML}
  `;
}

function nextPhoto() {
  const photos = getPhotoList(currentRecipe || {});
  if (photos.length < 2) return;
  currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
  renderPhotoViewer();
}

function jumpToPhoto(i) {
  currentPhotoIndex = i;
  renderPhotoViewer();
}

const UNFILE_WEBHOOK_URL = 'https://squirrelystash.app.n8n.cloud/webhook/unfile-photo';

async function sendPhotoToReview(label) {
  const slot = PHOTO_SLOT_MAP[label];
  if (!slot || !currentRecipe) return;

  const url = currentRecipe[slot.photoField];
  if (!url) return;

  let sourcePath;
  try {
    sourcePath = decodeURIComponent(new URL(url).searchParams.get('path'));
  } catch (e) {
    console.error('Could not parse source path from URL:', url);
    alert('Could not determine the file location for this photo — it may not use the standard proxy URL format.');
    return;
  }

  if (!confirm(`Send this "${label}" photo back to the inbox for re-review? It will be removed from this recipe until you re-file it.`)) return;

  try {
    const res = await fetch(UNFILE_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_path: sourcePath,
        recipe_id: currentRecipe.id,
        photo_field: slot.photoField,
        note_field: slot.noteField,
      }),
    });
    if (!res.ok) throw new Error('Webhook returned ' + res.status);

    currentRecipe[slot.photoField] = '';
    currentRecipe[slot.noteField] = '';
    currentPhotoIndex = 0;
    renderLeft();
  } catch (e) {
    console.error('Send to review failed:', e);
    alert('Could not send this photo back for review — is the n8n webhook live?');
  }
}

function calcTsp(base) {
  if (!base || isNaN(base)) return '—';
  const v = parseFloat(base) * currentYardage / 100;
  if (v <= 0) return '—';
  if (v <= 0.125) return '⅛ tsp';
  if (v <= 0.25) return '¼ tsp';
  if (v <= 0.375) return '⅜ tsp';
  if (v <= 0.5) return '½ tsp';
  if (v <= 0.75) return '¾ tsp';
  if (Number.isInteger(v)) return `${v} tsp`;
  return `${v.toFixed(1)} tsp`;
}

function calcMl(base) {
  if (!base || isNaN(base)) return '—';
  const v = parseFloat(base) * currentYardage / 100;
  if (v <= 0) return '—';
  return `${Math.round(v)} mL`;
}

function setYardage(val, btn) {
  currentYardage = val;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('customInput').value = '';
  if (currentRecipe) renderLeft();
}

function setCustomYardage(val) {
  const n = parseInt(val);
  if (n > 0) {
    currentYardage = n;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    if (currentRecipe) renderLeft();
  }
}

function mixColors(hex1, hex2, ratioTo2) {
  const c1 = parseInt(hex1.replace('#', ''), 16);
  const c2 = parseInt(hex2.replace('#', ''), 16);
  const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
  const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
  const t = Math.max(0, Math.min(100, ratioTo2)) / 100;
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function ringGetMidPct(startPct, endPct) {
  let end = endPct;
  if (end <= startPct) end += 100;
  return ((startPct + end) / 2) % 100;
}

function ringAbbreviateLabel(name, widthDeg) {
  if (!name) return '';
  const maxChars = widthDeg < 18 ? 3 : widthDeg < 32 ? 6 : widthDeg < 55 ? 10 : 16;
  if (name.length <= maxChars) return name;
  return name.slice(0, Math.max(1, maxChars - 1)) + '…';
}

function ringPolarToCartesian(cx, cy, r, angleDeg) {
  const rad = angleDeg * Math.PI / 180;
  return { x: cx + r * Math.sin(rad), y: cy - r * Math.cos(rad) };
}

function ringDescribeAnnulusSector(cx, cy, rOuter, rInner, startPct, endPct) {
  let startAngle = (startPct / 100) * 360;
  let endAngle = (endPct / 100) * 360;
  if (endAngle <= startAngle) endAngle += 360;
  if (endAngle - startAngle > 359.9) endAngle = startAngle + 359.9;
  const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
  const outerStart = ringPolarToCartesian(cx, cy, rOuter, startAngle);
  const outerEnd = ringPolarToCartesian(cx, cy, rOuter, endAngle);
  const innerEnd = ringPolarToCartesian(cx, cy, rInner, endAngle);
  const innerStart = ringPolarToCartesian(cx, cy, rInner, startAngle);
  return [
    `M ${outerStart.x} ${outerStart.y}`,
    `A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${outerEnd.x} ${outerEnd.y}`,
    `L ${innerEnd.x} ${innerEnd.y}`,
    `A ${rInner} ${rInner} 0 ${largeArc} 0 ${innerStart.x} ${innerStart.y}`,
    'Z'
  ].join(' ');
}

function buildLayoutRingSvg(baseSegs, overlays) {
  const CX = 200, CY = 200;
  const BASE_R_OUT = 160, BASE_R_IN = 100;
  const OVERLAY_R_OUT = 185, OVERLAY_R_IN = 165;

  let inner = '<defs><pattern id="cardBlendHatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="0" y2="7" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"></line></pattern></defs>';

  baseSegs.forEach((seg, idx) => {
    const path = ringDescribeAnnulusSector(CX, CY, BASE_R_OUT, BASE_R_IN, seg.startPct, seg.endPct);
    let fill;
    if (seg.type === 'Space') {
      fill = '#F0EDE8';
    } else if (seg.type === 'Blend') {
      const n = baseSegs.length;
      const prevColor = guessColor(baseSegs[(idx - 1 + n) % n].dyeName);
      const nextColor = guessColor(baseSegs[(idx + 1) % n].dyeName);
      fill = mixColors(prevColor, nextColor, seg.blendRatio ?? 50);
    } else {
      fill = guessColor(seg.dyeName);
    }
    inner += `<path d="${path}" fill="${fill}" stroke="white" stroke-width="1"></path>`;
    if (seg.type === 'Blend') {
      inner += `<path d="${path}" fill="url(#cardBlendHatch)"></path>`;
    }
  });

  overlays.forEach(mark => {
    const path = ringDescribeAnnulusSector(CX, CY, OVERLAY_R_OUT, OVERLAY_R_IN, mark.startPct, mark.endPct);
    const isPowder = mark.applicationType === 'Powder';
    const dash = isPowder ? 'stroke-dasharray="3,2"' : '';
    const opacity = isPowder ? 0.55 : 1;
    inner += `<path d="${path}" fill="${guessColor(mark.dyeName)}" fill-opacity="${opacity}" ${dash} stroke="white" stroke-width="1"></path>`;
  });

  baseSegs.forEach((seg, idx) => {
    let widthPct = seg.endPct - seg.startPct;
    if (widthPct <= 0) widthPct += 100;
    const widthDeg = (widthPct / 100) * 360;
    const label = seg.type === 'Blend'
      ? (widthDeg < 22 ? '⇄' : `⇄ ${Math.round(seg.blendRatio ?? 50)}%`)
      : ringAbbreviateLabel(seg.dyeName, widthDeg);
    if (label) {
      const midPct = ringGetMidPct(seg.startPct, seg.endPct);
      const pt = ringPolarToCartesian(CX, CY, (BASE_R_OUT + BASE_R_IN) / 2, (midPct / 100) * 360);
      inner += `<text x="${pt.x}" y="${pt.y}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-family="Inter, sans-serif" font-weight="600" fill="white" stroke="rgba(0,0,0,0.55)" stroke-width="3" paint-order="stroke">${label}</text>`;
    }
  });

  overlays.forEach(mark => {
    const midPct = ringGetMidPct(mark.startPct, mark.endPct);
    const label = ringAbbreviateLabel(mark.dyeName, 22);
    if (label) {
      const pt = ringPolarToCartesian(CX, CY, OVERLAY_R_OUT + 9, (midPct / 100) * 360);
      inner += `<text x="${pt.x}" y="${pt.y}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="Inter, sans-serif" font-weight="600" fill="#6B5E52">${label}</text>`;
    }
  });

  inner += `<circle cx="${CX}" cy="${CY}" r="${BASE_R_IN - 10}" fill="#F7F3EE"></circle>`;

  const displaySize = document.body.classList.contains('big-mode') ? 380 : 280;
  return `<svg viewBox="0 0 400 400" width="${displaySize}" height="${displaySize}">${inner}</svg>`;
}

function renderLeft() {
  const r = currentRecipe;
  const comps = [...currentComponents].sort((a,b) => (a.Step_Number||99) - (b.Step_Number||99));

  const tags = [
    r.Dye_Method ? `<span class="meta-tag tag-method">${r.Dye_Method}</span>` : '',
    r.Fiber_Type ? `<span class="meta-tag tag-fiber">${r.Fiber_Type}</span>` : '',
    r.Recipe_Scope ? `<span class="meta-tag tag-scope">${r.Recipe_Scope}</span>` : '',
  ].join('');

  const dyeRows = comps.map(c => {
    const col = guessColor(c.Dye_Name || '');
    const brand = (c.Dye_Full || '').match(/\(([A-Za-z]+)\)/);
    return `<tr>
      <td><div class="dye-name-cell">
        <span class="swatch" style="background:${col}"></span>
        ${c.Dye_Name || '—'}
        ${brand ? `<span class="brand">${brand[1]}</span>` : ''}
      </div></td>
      <td><span class="amt">${calcTsp(c['Std_Powder_tsp_'])}</span></td>
      <td><span class="amt">${calcMl(c['Std_Water_mL_'])}</span></td>
      <td><span class="amt">${calcMl(c['Effective_mL_per_100_yd'] || c['Default_mL_per_100_yds'])}</span></td>
      <td>${c.Dilution_Ratio ? `<span class="dil">${c.Dilution_Ratio}</span>` : ''}</td>
    </tr>`;
  }).join('');

  const previewPickerHTML = previewPickerOpen ? `
    <div class="preview-picker-dropdown">
      ${currentProductPhotos.length ? currentProductPhotos.map(p => `
        <div class="preview-picker-row ${p.isPreview ? 'selected' : ''}" onclick="selectPreviewPhoto(${p.id})">
          <img src="${p.url}" alt="${p.filename || ''}" onerror="this.style.opacity=0.2">
          <div class="preview-picker-info">
            <div class="ppr-name">${p.filename || 'Untitled'}</div>
            ${p.isPreview ? '<div class="ppr-current">current preview</div>' : ''}
          </div>
        </div>
      `).join('') : `<div class="preview-picker-empty">No product photos filed for this recipe yet</div>`}
    </div>
  ` : '';

  const stepComps = [...currentComponents]
    .filter(c => c.Application_Notes || c.Step_Number)
    .sort((a,b) => (a.Step_Order || a.Step_Number || 99) - (b.Step_Order || b.Step_Number || 99));

  const stepsHTML = stepComps.map((c, i) => {
    const col = guessColor(c.Dye_Name || '');
    return `
      <div class="step-item" onclick="toggleStep(this)">
        <div class="step-num">${i+1}</div>
        <div class="step-content">
          ${c.Dye_Name ? `<div class="step-dye" style="color:${col}">${c.Dye_Name}</div>` : ''}
          <div class="step-text">${c.Application_Notes || ''}</div>
          ${c.Position ? `<div class="step-pos">📍 ${c.Position}</div>` : ''}
          ${c.Technique ? `<div class="step-pos">✋ ${c.Technique}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('leftPanel').innerHTML = `
    <div class="recipe-header-row">
      <div>
        <div class="recipe-name">${r.Recipe_Name || 'Unnamed Recipe'}</div>
        <div class="recipe-meta">${tags}</div>
      </div>
      ${currentProductPhotos.length ? `
        <div class="preview-wrap">
          ${currentPreviewUrl ? `
            <div class="product-preview-thumb" onclick="openLightbox('${currentPreviewUrl.replace(/'/g, "\\'")}','Product photo')" title="Product photo preview — click to enlarge">
              <img src="${currentPreviewUrl}" alt="Product preview" onerror="this.parentElement.style.display='none'">
            </div>
          ` : `
            <div class="product-preview-thumb empty" onclick="togglePreviewPicker()" title="Choose a preview photo">+</div>
          `}
          <button class="preview-edit-btn" onclick="togglePreviewPicker()" title="Change preview photo">✎</button>
          <button class="preview-refresh-btn" onclick="refreshPreviewAndRerender()" title="Re-check for preview changes made elsewhere">↻</button>
          ${previewPickerHTML}
        </div>
      ` : ''}
    </div>

    <div class="yardage-row">
      <span class="yardage-label">Yards</span>
      <button class="preset-btn ${currentYardage===100?'active':''}" onclick="setYardage(100,this)">100</button>
      <button class="preset-btn ${currentYardage===200?'active':''}" onclick="setYardage(200,this)">200</button>
      <button class="preset-btn ${currentYardage===400?'active':''}" onclick="setYardage(400,this)">400</button>
      <button class="preset-btn ${currentYardage===500?'active':''}" onclick="setYardage(500,this)">500</button>
      <input class="custom-input" id="customInput" type="number" placeholder="custom" min="1" oninput="setCustomYardage(this.value)">
    </div>

    <div class="slabel">Dye mix · ${currentYardage} yards</div>
    <table class="dye-table">
      <thead><tr>
        <th style="width:38%">Dye</th>
        <th>Powder</th>
        <th>Water</th>
        <th>mL/run</th>
        <th>Dilution</th>
      </tr></thead>
      <tbody>${dyeRows || '<tr><td colspan="5" class="no-data">No dye components — add in Recipe Dye Components table</td></tr>'}</tbody>
    </table>

    <div class="slabel" style="margin-top:20px;">Application steps</div>
    <div class="steps-list" id="stepsList">
      ${stepsHTML || '<div class="no-data">No steps yet — add Application_Notes to dye components in Grist</div>'}
    </div>
    ${stepComps.length ? `
    <div class="progress-row">
      <span class="prog-label" id="progLabel">0 of ${stepComps.length} done</span>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <button class="reset-btn" onclick="resetSteps()">Reset</button>
    </div>` : ''}

    ${r.Notes ? `
    <div class="notes-box">
      <div class="notes-title">Recipe notes</div>
      ${r.Notes}
    </div>` : ''}
  `;
}

function renderRight() {
  const r = currentRecipe;
  const comps = [...currentComponents].sort((a,b) => (a.Step_Number||99) - (b.Step_Number||99));
  const colors = comps.map(c => guessColor(c.Dye_Name || ''));
  const bars = colors.map(c => `<div class="skein-bar" style="background:${c};flex:1"></div>`).join('');
  const barsRev = [...colors].reverse().map(c => `<div class="skein-bar" style="background:${c};flex:1"></div>`).join('');
  const hasPhotos = !!(r.Photo_Process_1 || r.Photo_Process_2 || r.Photo_Finished);

  document.getElementById('rightPanel').innerHTML = `
    ${currentBaseSegments.length ? `
    <div class="slabel">Color layout</div>
    <div class="layout-ring-wrap">${buildLayoutRingSvg(currentBaseSegments, currentOverlayMarks)}</div>
    ${r.Layout_Description ? `<div class="layout-note">${r.Layout_Description}</div>` : ''}
    ` : colors.length ? `
    <div class="slabel">Color layout</div>
    <div class="layout-wrap">
      <div class="skein-row">
        <div class="skein-lbl">Top →</div>
        <div class="skein-bars">${bars}</div>
      </div>
      <div class="skein-row">
        <div class="skein-lbl">← Bottom</div>
        <div class="skein-bars">${barsRev}</div>
      </div>
      ${r.Layout_Description ? `<div class="layout-note">${r.Layout_Description}</div>` : ''}
    </div>` : ''}

    ${hasPhotos ? `<div class="slabel">Reference photos</div><div id="photoViewerWrap"></div>` : ''}
  `;

  renderPhotoViewer();
}

function toggleStep(el) {
  el.classList.toggle('done');
  updateProgress();
}

function updateProgress() {
  const steps = document.querySelectorAll('.step-item');
  const done = [...steps].filter(s => s.classList.contains('done')).length;
  const l = document.getElementById('progLabel');
  const f = document.getElementById('progFill');
  if (l) l.textContent = `${done} of ${steps.length} done`;
  if (f) f.style.width = steps.length ? `${Math.round(done/steps.length*100)}%` : '0%';
}

function resetSteps() {
  document.querySelectorAll('.step-item').forEach(s => s.classList.remove('done'));
  updateProgress();
}

// ── GRIST INTEGRATION ──
grist.ready({
  requiredAccess: 'full'
});

async function refreshPreviewPhotos() {
  if (!currentRecipe) return;
  const recipeRowId = currentRecipe.id;

  try {
    const photoTable = await grist.docApi.fetchTable('Product_Photos');
    const ids = photoTable.id || [];
    const refs = photoTable.Recipe || [];
    const previews = photoTable.Is_Preview || [];
    const urls = photoTable.Nextcloud_URL || [];
    const filenames = photoTable.Source_Filename || [];
    const lotDates = photoTable.Lot_Date || [];

    const candidates = [];
    let matchUrl = null;
    let matchId = null;

    for (let i = 0; i < ids.length; i++) {
      const ref = refs[i];
      const refId = typeof ref === 'number' ? ref
        : Array.isArray(ref) ? ref[1]
        : (ref && typeof ref === 'object' && 'rowId' in ref) ? ref.rowId
        : null;
      if (refId !== recipeRowId) continue;

      candidates.push({
        id: ids[i],
        url: urls[i],
        filename: filenames[i],
        lotDate: lotDates[i],
        isPreview: !!previews[i],
      });

      if (previews[i]) {
        matchUrl = urls[i];
        matchId = ids[i];
      }
    }

    candidates.sort((a, b) => (Number(b.lotDate) || 0) - (Number(a.lotDate) || 0));
    currentProductPhotos = candidates;
    currentPreviewUrl = matchUrl;
    currentPreviewId = matchId;
  } catch (e) {
    console.error('Failed to fetch preview photo:', e);
    currentProductPhotos = [];
    currentPreviewUrl = null;
    currentPreviewId = null;
  }
}

async function refreshPreviewAndRerender() {
  await refreshPreviewPhotos();
  renderLeft();
}

grist.onRecord(async (record) => {
  if (!record || !record.Recipe_Name) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('cardView').style.display = 'none';
    return;
  }

  currentRecipe = record;
  currentPhotoIndex = 0;
  previewPickerOpen = false;
  const recipeRowId = record.id;
  console.log('Selected recipe row ID:', recipeRowId, 'Name:', record.Recipe_Name);

  try {
    const tableData = await grist.docApi.fetchTable('Recipe_Dye_Components');
    const ids = tableData.id || [];
    const recipeRefs = tableData.Recipe || [];

    console.log('Total components:', ids.length);
    console.log('First few Recipe refs:', recipeRefs.slice(0, 5));
    console.log('Looking for ID:', recipeRowId);

    currentComponents = ids.map((id, i) => {
      const get = (col) => Array.isArray(tableData[col]) ? tableData[col][i] : undefined;
      return {
        id,
        Recipe: get('Recipe'),
        Dye_Name: get('Dye_Name'),
        Dye_Full: get('Dye_Full'),
        'Std_Powder_tsp_': get('Std_Powder_tsp_'),
        'Std_Water_mL_': get('Std_Water_mL_'),
        'Default_mL_per_100_yds': get('Default_mL_per_100_yds'),
        'Effective_mL_per_100_yd': get('Effective_mL_per_100_yd'),
        Dilution_Ratio: get('Dilution_Ratio'),
        Step_Order: get('Step_Order'),
        Step_Number: get('Step_Number'),
        Application_Notes: get('Application_Notes'),
        Position: get('Position'),
        Technique: get('Technique'),
        Layer_Order: get('Layer_Order'),
      };
    }).filter(c => {
      const ref = c.Recipe;
      // Handle all possible formats Grist might return
      if (typeof ref === 'number') return ref === recipeRowId;
      if (Array.isArray(ref)) return ref[1] === recipeRowId;
      if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId === recipeRowId;
      return false;
    });

    console.log('Matched components:', currentComponents.length);

  } catch(e) {
    console.error('Failed to fetch components:', e);
    currentComponents = [];
  }

  try {
    const layoutTable = await grist.docApi.fetchTable('Recipe_Layout_Segments');
    const lIds = layoutTable.id || [];
    const lRefs = layoutTable.Recipe || [];
    const getRefIdLocal = (ref) => {
      if (typeof ref === 'number') return ref;
      if (Array.isArray(ref)) return ref[1];
      if (typeof ref === 'object' && ref !== null && 'rowId' in ref) return ref.rowId;
      return null;
    };
    const base = [];
    const overlays = [];
    for (let i = 0; i < lIds.length; i++) {
      if (getRefIdLocal(lRefs[i]) !== recipeRowId) continue;
      const get = (col) => Array.isArray(layoutTable[col]) ? layoutTable[col][i] : undefined;
      const row = {
        dyeName: get('Dye_Name') || '',
        startPct: Number(get('Start_Pct')) || 0,
        endPct: Number(get('End_Pct')) || 0,
        type: get('Segment_Type') || 'Solid',
        blendRatio: Number(get('Blend_Ratio')) || 50,
        applicationType: get('Application_Type') || 'Dye',
        order: get('Segment_Order') || 0,
      };
      if (get('Layer') === 'Overlay') overlays.push(row);
      else base.push(row);
    }
    base.sort((a, b) => a.startPct - b.startPct);
    currentBaseSegments = base;
    currentOverlayMarks = overlays;
  } catch (e) {
    console.error('Failed to fetch layout segments:', e);
    currentBaseSegments = [];
    currentOverlayMarks = [];
  }

  await refreshPreviewPhotos();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('cardView').style.display = 'grid';

  renderLeft();
  renderRight();
});
</script>
